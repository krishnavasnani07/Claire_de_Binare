schema_version: "1.0"
read_order:
  - id: "01"
    path: "README.md"
    intent: "Get the project overview and current operational framing"
    expected_signal: "What exists, what matters now, and quickstart pointers"
  - id: "02"
    path: "docs/index.md"
    intent: "Find the shortest local navigation page"
    expected_signal: "Pointers into CI, env, DB, and live-readiness"
  - id: "03"
    path: "DEVELOPER_ONBOARDING.md"
    intent: "Bootstrap a local development environment"
    expected_signal: "Prereqs, secrets, stack bring-up, verification"
  - id: "03a"
    path: "docs/onboarding/DEVELOPER_VISUAL_START_HERE.md"
    intent: "Visual developer start with Mermaid flow, examples and templates"
    expected_signal: "Developer flow diagrams, Repo Brain flow, example index, template index"
  - id: "03b"
    path: "docs/onboarding/examples/README.md"
    intent: "Developer workflow examples (issue-to-PR, Repo Brain first use)"
    expected_signal: "First issue flow, first PR flow, Repo Brain first use"
  - id: "04"
    path: "Makefile"
    intent: "See the command surface"
    expected_signal: "Common test/stack/validation targets"
  - id: "05"
    path: ".github/workflows/ci.yml"
    intent: "Read the primary CI contract"
    expected_signal: "Required jobs, lint/test gates, MCP validation"
  - id: "06"
    path: "infrastructure/compose/README.md"
    intent: "Understand local stack topology and compose layering"
    expected_signal: "BLUE+RED runtime compose fragments and expected startup flow"
  - id: "07"
    path: ".mcp.json"
    intent: "See the default MCP gateway config"
    expected_signal: "Which MCP server is launched from root config"
  - id: "08"
    path: "claire-de-binare.mcp.json"
    intent: "See the repo-local MCP service config"
    expected_signal: "Concrete MCP server settings used in this repo"
  - id: "09"
    path: "tools/validate_mcp_config.py"
    intent: "See what MCP config validation actually checks"
    expected_signal: "How MCP configs are discovered and validated"
  - id: "10"
    path: "tests/smoke/test_mcp_runtime.py"
    intent: "Read the concrete MCP runtime smoke contract"
    expected_signal: "What a minimally working MCP runtime must do"
  - id: "11"
    path: "core/config/trading_mode.py"
    intent: "Inspect the safety-critical runtime gate"
    expected_signal: "Paper/staged/live semantics and live-confirmation fail-close"
  - id: "12"
    path: "services/README.md"
    intent: "Understand service boundaries"
    expected_signal: "Service topology and domain split"
  - id: "13"
    path: "tests/README.md"
    intent: "Get the test taxonomy"
    expected_signal: "Unit/integration/replay/smoke entrypoints"
  - id: "13a"
    path: "docs/runbooks/README.md"
    intent: "Find operative runbook index and control pointers"
    expected_signal: "CONTROL_REGISTER, CI/GitHub runbooks, evidence boundary"
  - id: "13b"
    path: "docs/surrealdb/README.md"
    intent: "Find SurrealDB context and MCP navigation"
    expected_signal: "Local context runtime docs and MCP capability pointers; developer onboarding cross-ref"
  - id: "13c"
    path: "docs/onboarding/repo_brain_context_intelligence.md"
    intent: "Get the full Repo Brain / Context Intelligence onboarding"
    expected_signal: "Brain Evidence Block guide, safety boundaries, first-use flow, local readiness check"
  - id: "14"
    path: "tools/README.md"
    intent: "Review local helper inventory"
    expected_signal: "Diagnostics, validation, secrets, replay tooling"
  - id: "15"
    path: "AGENTS.md"
    intent: "Clarify agent-doc ownership boundaries"
    expected_signal: "Root pointer resolves to local agents/AGENTS.md in this working repo"
minimal_context_bundle:
  - "README.md"
  - "docs/index.md"
  - "docs/onboarding/DEVELOPER_VISUAL_START_HERE.md"
  - "DEVELOPER_ONBOARDING.md"
  - "Makefile"
  - ".github/workflows/ci.yml"
  - "infrastructure/compose/README.md"
  - "docs/surrealdb/README.md"
  - "tools/README.md"
  - "tests/README.md"
  - "services/README.md"
  - "mcp_navpack_working_repo/ENTRYPOINTS.yaml"
  - "mcp_navpack_working_repo/CHEATSHEET.md"
  - "AGENTS.md"
