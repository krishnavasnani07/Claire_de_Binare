# Claire de Binare - Prometheus Alert Rules
# Issue #96: Monitoring & Alerting

groups:
  # =============================================================================
  # MINIMAL OBSERVABILITY - Issue #210
  # =============================================================================
  - name: minimal_observability
    rules:
      - alert: MinimalServiceDown
        expr: up{job=~"cdb_(execution|signal|db_writer|candles)", env!="dev"} == 0
        for: 2m
        labels:
          severity: high
        annotations:
          summary: "Minimal service {{ $labels.job }} is down"
          description: "{{ $labels.instance }} has been down for more than 2 minutes."

  # =============================================================================
  # CRITICAL ALERTS - Immediate Action Required
  # =============================================================================
  - name: critical_alerts
    rules:
      - alert: ServiceDown
        expr: up{job=~"cdb_.*", job!="cdb_cadvisor"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.instance }} has been down for more than 1 minute."

      - alert: CircuitBreakerTriggered
        expr: circuit_breaker_active == 1
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Circuit Breaker triggered on {{ $labels.instance }}"
          description: "circuit_breaker_active=1 on {{ $labels.instance }}. Trading halted."

      - alert: DatabaseConnectionLost
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL connection lost"
          description: "Database connection has been down for 30 seconds."

      - alert: RedisConnectionLost
        expr: redis_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis connection lost"
          description: "Redis connection has been down for 30 seconds. Order flow interrupted."

  # =============================================================================
  # WARNING ALERTS
  # =============================================================================
  - name: warning_alerts
    rules:
      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.container_name }}"
          description: "Container CPU usage is {{ $value | humanizePercentage }}."

      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes / container_memory_limit_bytes > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.container_name }}"
          description: "Memory usage is {{ $value | humanizePercentage }}."

  # =============================================================================
  # INFRASTRUCTURE ALERTS
  # =============================================================================
  - name: infrastructure_alerts
    rules:
      - alert: ContainerRestarting
        expr: increase(container_restart_count[1h]) > 3
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.container_name }} is restarting frequently"
          description: "{{ $value }} restarts in the last hour."

      - alert: PrometheusTargetDown
        expr: up{job!="prometheus"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Prometheus target {{ $labels.job }} is down"
          description: "Metrics collection interrupted for {{ $labels.instance }}."

  # =============================================================================
  # SOAK TEST GATES - Issue #428 (72h Zero Restart Policy)
  # =============================================================================
  - name: soak_test_gates
    interval: 30s
    rules:
      - alert: SoakTest_ServiceDown
        expr: up{job=~"cdb_(redis|postgres|ws|signal|risk|execution|db_writer)"} == 0
        for: 5m
        labels:
          severity: critical
          soak_test: abort
        annotations:
          summary: "ABORT: Critical service {{ $labels.job }} down >5min"
          description: "Service {{ $labels.job }} on {{ $labels.instance }} has been down for more than 5 minutes. Soak test MUST be aborted."
          runbook_url: "docs/operations/72H_SOAK_TEST_RUNBOOK.md#abort-triggers"

      - alert: SoakTest_ServiceRestartLoop
        expr: sum(rate(container_restart_count{name=~"cdb_.*"}[1h])) by (name) > 2
        for: 0s
        labels:
          severity: critical
          soak_test: abort
        annotations:
          summary: "ABORT: Service {{ $labels.name }} restart loop detected"
          description: "Container {{ $labels.name }} restarted {{ $value }} times in last hour. Zero Restart Policy violated."
          runbook_url: "docs/operations/72H_SOAK_TEST_RUNBOOK.md#abort-triggers"

      - alert: SoakTest_MemoryOOM
        expr: container_memory_oom_kill_total{name=~"cdb_.*"} > 0
        for: 0s
        labels:
          severity: critical
          soak_test: abort
        annotations:
          summary: "ABORT: Container {{ $labels.name }} killed by OOM"
          description: "Out-of-memory killer terminated {{ $labels.name }}. Memory leak or insufficient limits."
          runbook_url: "docs/operations/72H_SOAK_TEST_RUNBOOK.md#abort-triggers"

      - alert: SoakTest_NoOrdersGenerated
        expr: rate(execution_orders_received_total[1h]) == 0
        for: 1h
        labels:
          severity: high
          soak_test: investigate
        annotations:
          summary: "INVESTIGATE: No orders generated in last hour"
          description: "Order generation rate is 0. Check signal engine and market data flow."
          runbook_url: "docs/operations/72H_SOAK_TEST_RUNBOOK.md#troubleshooting-common-issues"

      - alert: TradePipelineStalled
        expr: |
          rate(signals_received_total[5m]) > 0
          and (
            (
              rate(orders_blocked_total[5m]) > 0
              and rate(orders_approved_total[5m]) == 0
            )
            or
            (
              rate(orders_approved_total[5m]) > 0
              and rate(execution_orders_filled_total[5m]) == 0
            )
          )
        for: 10m
        labels:
          severity: warning
          component: trading_pipeline
          issue: pipeline_stall
        annotations:
          summary: "Pipeline stalled: risk blockade OR execution not filling"
          description: |
            Signals flowing. Either Risk blocks all approvals OR Execution fills zero despite approvals.

            **Diagnostic Commands:**
            1. Check risk manager state: `docker logs cdb_risk --tail 100 | grep -i "exposure\|blocked"`
            2. Check execution service: `docker logs cdb_execution --tail 100`
            3. Verify database connectivity: `docker exec cdb_postgres pg_isready`
            4. Check Redis streams: `docker exec cdb_redis redis-cli XLEN stream.orders`

            **Current Flow Rates (5m):**
            - Signals: {{ query "rate(signals_received_total[5m])" | first | value | humanize }}/s
            - Blocked: {{ query "rate(orders_blocked_total[5m])" | first | value | humanize }}/s
            - Approvals: {{ query "rate(orders_approved_total[5m])" | first | value | humanize }}/s
            - Trades: {{ query "rate(execution_orders_filled_total[5m])" | first | value | humanize }}/s

            **Root Cause:** Likely in-memory state drift or resource starvation.

      - alert: SoakTest_HighMemoryUsage
        expr: (container_memory_usage_bytes{name=~"cdb_.*"} / container_memory_limit_bytes{name=~"cdb_.*"}) > 0.8
        for: 30m
        labels:
          severity: high
          soak_test: investigate
        annotations:
          summary: "INVESTIGATE: {{ $labels.name }} memory usage >80%"
          description: "Container {{ $labels.name }} using {{ $value | humanizePercentage }} of memory limit. Potential leak."
          runbook_url: "docs/operations/72H_SOAK_TEST_RUNBOOK.md#high-memory-usage"
