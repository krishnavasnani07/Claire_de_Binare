# Prometheus v3 Canary Overlay (Step 1)
# Usage (example):
#   docker compose -f infrastructure/compose/compose.red.yml -f infrastructure/compose/compose.prometheus-v3.yml --profile prometheus-v3-canary up -d cdb_prometheus_v3
#
# Scope:
# - Adds an optional parallel Prometheus v3 canary service
# - Does not change default runtime service cdb_prometheus (v2.55.0)

services:
  cdb_prometheus_v3:
    image: prom/prometheus:v3.10.0@sha256:4a61322ac1103a0e3aea2a61ef1718422a48fa046441f299d71e660a3bc71ae9
    container_name: cdb_prometheus_v3
    restart: unless-stopped
    profiles:
      - prometheus-v3-canary
    volumes:
      - ../../infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../infrastructure/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prom_v3_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "127.0.0.1:19091:9090"
    networks:
      - cdb_network

volumes:
  prom_v3_data:
