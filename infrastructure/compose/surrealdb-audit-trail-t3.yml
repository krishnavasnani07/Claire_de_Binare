# T3 Governed Audit Trail Stack (isolated from BLUE/RED and T2 sidecar)
# Usage:
#   SECRETS_PATH=... docker compose --env-file ${SECRETS_PATH}/audit_trail_t3.compose.env \
#     -f infrastructure/compose/surrealdb-audit-trail-t3.yml up -d
#
# REQUIREMENTS:
# - Does NOT join cdb_network
# - TLS certs mounted from ${SECRETS_PATH}/audit_trail_tls/
# - Credentials supplied via audit_trail_t3.compose.env (generated by bootstrap script)
# - Non-localhost host bind on 8020 (HTTPS via SurrealDB web TLS)

name: cdb_audit_trail_t3

services:
  cdb_surrealdb_audit_trail:
    image: surrealdb/surrealdb:v2.2.1
    container_name: cdb_surrealdb_audit_trail
    restart: unless-stopped
    user: "0:0"
    ports:
      - "0.0.0.0:8020:8020"
    volumes:
      - audit_trail_data:/data
      - ${SECRETS_PATH}/audit_trail_tls:/tls:ro
    command:
      - start
      - --log
      - info
      - --user
      - ${SURREAL_USER}
      - --pass
      - ${SURREAL_PASS}
      - --bind
      - 0.0.0.0:8020
      - --web-crt
      - /tls/cert.pem
      - --web-key
      - /tls/key.pem
      - surrealkv:/data/surrealdb
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "-e", "https://127.0.0.1:8020"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - audit_trail_t3_net

volumes:
  audit_trail_data:
    driver: local

networks:
  audit_trail_t3_net:
    driver: bridge
