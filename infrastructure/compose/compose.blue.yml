# CDB BLUE Stack - Core Trading Infrastructure
# Always-On Services: Data + Control + Core Trading
# Must be operational for trading to function
#
# Architecture: Blue/Red Split (Evidence-based, file:line verified)
# - BLUE = Core dependencies verified in services/risk/service.py:566,888,1019
# - RED = Optional signal generation + monitoring (separate compose.red.yml)
#
# Usage:
#   docker network create cdb_network  # One-time setup
#   docker compose -f compose.blue.yml up -d
#   python ../../scripts/smoke_core_flow.py  # Verify

name: cdb-blue

services:
  # ==================== DATA LAYER ====================

  cdb_postgres:
    image: postgres:15.17-alpine
    container_name: cdb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: claire_de_binare
      POSTGRES_USER: ${POSTGRES_USER:-claire_user}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../infrastructure/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../infrastructure/database/migrations/002_orders_price_nullable.sql:/docker-entrypoint-initdb.d/02-migration-002.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claire_user} -d claire_de_binare"]
      interval: 10s
      timeout: 3s
      retries: 3
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - cdb_network

  cdb_redis:
    image: redis:7.4.8-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: cdb_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    secrets:
      - redis_password
    command: ["sh", "-c", "redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass $$(cat /run/secrets/redis_password)"]
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $$(cat /run/secrets/redis_password) ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - cdb_network

  cdb_market:
    build:
      context: ../..
      dockerfile: services/market/Dockerfile
    container_name: cdb_market
    restart: unless-stopped
    secrets:
      - redis_password
    environment:
      ENV: "development"
      LOG_LEVEL: "INFO"
      REDIS_HOST: cdb_redis
      MARKET_PORT: "8009"
      # cdb_market owns market_state:{symbol} after cutover (Issue #1201).
      # Evidence: reports/dual_write_evidence_2026-03-18_v2.json (PASS 2026-03-18)
      MARKET_STATE_KEY_PREFIX: "market_state"
    entrypoint: ["sh", "-c", "export REDIS_PASSWORD=$(cat /run/secrets/redis_password) && exec python -m services.market.service"]
    ports:
      - "127.0.0.1:8009:8009"
    volumes:
      - ../../logs:/app/logs
    depends_on:
      cdb_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8009/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - cdb_network

  # ==================== CONTROL LAYER ====================
  # Evidence: Risk depends on allocation + regime (services/risk/service.py:588-639)

  cdb_candles:
    build:
      context: ../..
      dockerfile: services/candles/Dockerfile
    container_name: cdb_candles
    restart: unless-stopped
    secrets:
      - redis_password
    environment:
      ENV: "development"
      LOG_LEVEL: "INFO"  # Reduced from DEBUG for BLUE
      REDIS_HOST: cdb_redis
      CANDLE_PORT: "8007"
      CANDLE_INTERVAL_SECONDS: "60"
      CANDLE_INPUT_CHANNEL: "market_data"
      CANDLE_OUTPUT_STREAM: "stream.candles_1m"
      # Kill-switch: cdb_candles market_state write disabled after cutover (Issue #1201).
      CANDLE_WRITE_MARKET_STATE: "false"
    entrypoint: ["sh", "-c", "export REDIS_PASSWORD=$(cat /run/secrets/redis_password) && exec python -u service.py"]
    ports:
      - "127.0.0.1:8007:8007"
    volumes:
      - ../../logs:/app/logs
    depends_on:
      cdb_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8007/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - cdb_network

  cdb_regime:
    build:
      context: ../..
      dockerfile: services/regime/Dockerfile
    container_name: cdb_regime
    restart: unless-stopped
    secrets:
      - redis_password
    environment:
      ENV: "development"
      LOG_LEVEL: "INFO"
      REDIS_HOST: cdb_redis
      REGIME_PORT: "8008"
      REGIME_INPUT_STREAM: "stream.candles_1m"
      REGIME_ADX_PERIOD: "14"
      REGIME_ATR_PERIOD: "14"
      REGIME_ADX_TREND_THRESHOLD: "25.0"
      REGIME_ADX_RANGE_THRESHOLD: "20.0"
      REGIME_ATR_HIGH_VOL_THRESHOLD: "2.0"
      REGIME_CONFIRMATION_BARS: "3"
    entrypoint: ["sh", "-c", "export REDIS_PASSWORD=$(cat /run/secrets/redis_password) && exec python -u service.py"]
    ports:
      - "127.0.0.1:8008:8008"
    volumes:
      - ../../logs:/app/logs
    depends_on:
      cdb_redis:
        condition: service_healthy
      cdb_candles:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8008/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - cdb_network

  cdb_allocation:
    build:
      context: ../..
      dockerfile: services/allocation/Dockerfile
    container_name: cdb_allocation
    restart: unless-stopped
    secrets:
      - redis_password
    environment:
      ENV: "development"
      LOG_LEVEL: "INFO"
      REDIS_HOST: cdb_redis
      ALLOCATION_PORT: "8006"
      ALLOCATION_REGIME_MIN_STABLE_SECONDS: "60"
      ALLOCATION_RULES_JSON: '{"paper": {"STEADY_BULLISH": 0.3, "TREND": 0.3, "VOLATILE_RANGE": 0.1, "RANGE": 0.1, "HIGH_VOL_CHAOTIC": 0.02, "UNKNOWN": 0.0}}'
    entrypoint: ["sh", "-c", "export REDIS_PASSWORD=$(cat /run/secrets/redis_password) && exec python -u service.py"]
    ports:
      - "127.0.0.1:8006:8006"
    volumes:
      - ../../logs:/app/logs
    depends_on:
      cdb_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8006/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - cdb_network

  # ==================== CORE TRADING LAYER ====================
  # Evidence: Risk blocks orders if allocation_pct <= 0 (services/risk/service.py:566)

  cdb_risk:
    build:
      context: ../..
      dockerfile: services/risk/Dockerfile
    container_name: cdb_risk
    restart: unless-stopped
    secrets:
      - redis_password
      - postgres_password
      - mexc_api_key
      - mexc_api_secret
    environment:
      ENV: "development"
      LOG_LEVEL: "INFO"
      REDIS_HOST: cdb_redis
      POSTGRES_HOST: cdb_postgres
      POSTGRES_USER: ${POSTGRES_USER:-claire_user}
      TRACE_CONTRACT_V1_ENABLED: "1"
      PAPER_AUTO_UNWIND: "true"
      CDB_KILL_SWITCH_STATE_FILE: "/app/kill_switch/.cdb_kill_switch.state"
    entrypoint: ["sh", "-c", "export REDIS_PASSWORD=$(cat /run/secrets/redis_password) && export POSTGRES_PASSWORD=$(cat /run/secrets/postgres_password) && export MEXC_API_KEY=$(cat /run/secrets/mexc_api_key) && export MEXC_API_SECRET=$(cat /run/secrets/mexc_api_secret) && exec python -m services.risk.service"]
    ports:
      - "127.0.0.1:8002:8002"
    volumes:
      - ../../logs:/app/logs
      - validation_data:/app/data
      - kill_switch_state:/app/kill_switch
    depends_on:
      cdb_postgres:
        condition: service_healthy
      cdb_redis:
        condition: service_healthy
      cdb_allocation:
        condition: service_healthy
      cdb_regime:
        condition: service_healthy
    networks:
      - cdb_network

  cdb_execution:
    build:
      context: ../..
      dockerfile: services/execution/Dockerfile
    container_name: cdb_execution
    restart: unless-stopped
    secrets:
      - redis_password
      - postgres_password
      - mexc_api_key
      - mexc_api_secret
    environment:
      ENV: "development"
      LOG_LEVEL: "INFO"
      MOCK_TRADING: "true"
      USE_REAL_BALANCE: "false"
      TRACE_CONTRACT_V1_ENABLED: "1"
      REDIS_HOST: cdb_redis
      POSTGRES_HOST: cdb_postgres
      POSTGRES_USER: ${POSTGRES_USER:-claire_user}
      CDB_KILL_SWITCH_STATE_FILE: "/app/kill_switch/.cdb_kill_switch.state"
    entrypoint: ["sh", "-c", "export REDIS_PASSWORD=$(cat /run/secrets/redis_password) && export POSTGRES_PASSWORD=$(cat /run/secrets/postgres_password) && export MEXC_API_KEY=$(cat /run/secrets/mexc_api_key) && export MEXC_API_SECRET=$(cat /run/secrets/mexc_api_secret) && exec python -u service.py"]
    ports:
      - "127.0.0.1:8003:8003"
    volumes:
      - ../../logs:/app/logs
      - kill_switch_state:/app/kill_switch
    depends_on:
      cdb_postgres:
        condition: service_healthy
      cdb_redis:
        condition: service_healthy
    networks:
      - cdb_network

  cdb_db_writer:
    build:
      context: ../..
      dockerfile: services/db_writer/Dockerfile
    container_name: cdb_db_writer
    restart: unless-stopped
    secrets:
      - redis_password
      - postgres_password
    environment:
      ENV: "development"
      LOG_LEVEL: "INFO"
      REDIS_HOST: cdb_redis
      POSTGRES_HOST: cdb_postgres
      POSTGRES_USER: ${POSTGRES_USER:-claire_user}
    entrypoint: ["sh", "-c", "export REDIS_PASSWORD=$(cat /run/secrets/redis_password) && export POSTGRES_PASSWORD=$(cat /run/secrets/postgres_password) && exec python -u db_writer.py"]
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
    depends_on:
      cdb_postgres:
        condition: service_healthy
      cdb_redis:
        condition: service_healthy
    networks:
      - cdb_network

  cdb_paper_runner:
    build:
      context: ../..
      dockerfile: tools/paper_trading/Dockerfile
    container_name: cdb_paper_runner
    restart: unless-stopped
    secrets:
      - redis_password
      - postgres_password
    environment:
      ENV: "development"
      LOG_LEVEL: "INFO"
      REDIS_HOST: cdb_redis
      POSTGRES_HOST: cdb_postgres
      POSTGRES_USER: ${POSTGRES_USER:-claire_user}
      PAPER_TRADING_DURATION_DAYS: ${PAPER_TRADING_DURATION_DAYS:-14}
    entrypoint: ["sh", "-c", "export REDIS_PASSWORD=$(cat /run/secrets/redis_password) && export POSTGRES_PASSWORD=$(cat /run/secrets/postgres_password) && exec python tools/paper_trading/service.py"]
    ports:
      - "127.0.0.1:8004:8004"
    volumes:
      - ../../logs:/app/logs
      - ../../tools/paper_trading:/app/tools/paper_trading:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      cdb_postgres:
        condition: service_healthy
      cdb_redis:
        condition: service_healthy
    networks:
      - cdb_network

# ==================== SECRETS ====================
secrets:
  redis_password:
    file: ${SECRETS_PATH:?SECRETS_PATH must be set}/REDIS_PASSWORD
  postgres_password:
    file: ${SECRETS_PATH:?SECRETS_PATH must be set}/POSTGRES_PASSWORD
  mexc_api_key:
    file: ${SECRETS_PATH:?SECRETS_PATH must be set}/MEXC_API_KEY.txt
  mexc_api_secret:
    file: ${SECRETS_PATH:?SECRETS_PATH must be set}/MEXC_API_SECRET.txt

# ==================== VOLUMES ====================
volumes:
  redis_data:
  postgres_data:
  validation_data:
  kill_switch_state:

# ==================== NETWORK ====================
# Shared with RED stack - create once: docker network create cdb_network
networks:
  cdb_network:
    external: true
    name: cdb_network
