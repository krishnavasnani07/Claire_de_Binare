# Claire de Binare - Shared Compose Base
# Core Services (Redis, Postgres, Prometheus, Grafana)
# No Port-Bindings (internal only)
# 431B baseline note: pair this file with test.yml for the canonical Docker CI lab path.
#
# SECRETS ARCHITECTURE (Blueprint-compliant):
# - Secrets mounted to /run/secrets/ (not in environment variables)
# - Not visible in `docker inspect` output
# - Official images use _FILE pattern where supported

# Issue #232: Deterministic project naming via STACK_NAME
name: ${STACK_NAME:-cdb}

services:
  cdb_redis:
    image: redis:7.4.8-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: cdb_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    secrets:
      - redis_password
    # Read password from /run/secrets/ file
    command: ["sh", "-c", "redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass $$(cat /run/secrets/redis_password)"]
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $$(cat /run/secrets/redis_password) ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - cdb_network

  cdb_postgres:
    image: postgres:15.17-alpine
    container_name: cdb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: claire_de_binare
      POSTGRES_USER: ${POSTGRES_USER:-claire_user}
      # Official Postgres image supports _FILE pattern
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../infrastructure/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../infrastructure/database/migrations/002_orders_price_nullable.sql:/docker-entrypoint-initdb.d/02-migration-002.sql:ro
      - ../../infrastructure/database/migrations/004_governance_v0.sql:/docker-entrypoint-initdb.d/04-migration-004.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claire_user} -d claire_de_binare"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - cdb_network

  cdb_prometheus:
    image: prom/prometheus:v3.10.0@sha256:4a61322ac1103a0e3aea2a61ef1718422a48fa046441f299d71e660a3bc71ae9
    container_name: cdb_prometheus
    restart: unless-stopped
    volumes:
      - ../../infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../infrastructure/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cdb_network

  cdb_grafana:
    image: grafana/grafana:11.4.7-ubuntu@sha256:c20611d00f4ddeb8cb73d9b73ecfdaab9775c81c9df627a91a366d9e95bbd800
    container_name: cdb_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      # Grafana supports _FILE pattern via __FILE suffix
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      # SMTP Configuration for Email Alerts
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: smtp.gmail.com:587
      GF_SMTP_USER__FILE: /run/secrets/smtp_user
      GF_SMTP_PASSWORD__FILE: /run/secrets/smtp_password
      GF_SMTP_FROM_ADDRESS__FILE: /run/secrets/smtp_from
      GF_SMTP_FROM_NAME: "CDB Alerts"
      GF_SMTP_STARTTLS_POLICY: MandatoryStartTLS
      # Postgres Datasource Auth (read from secret at startup via entrypoint)
      POSTGRES_USER: ${POSTGRES_USER:-claire_user}
    secrets:
      - postgres_password
      - grafana_password
      - smtp_user
      - smtp_password
      - smtp_from
      - alert_email_to
    # Export POSTGRES_PASSWORD from secret file before starting Grafana
    # so $__env{POSTGRES_PASSWORD} in datasource provisioning resolves correctly
    entrypoint: ["/bin/sh", "/usr/local/bin/entrypoint-postgres-password.sh"]
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../infrastructure/monitoring/grafana/entrypoint-postgres-password.sh:/usr/local/bin/entrypoint-postgres-password.sh:ro
      - ../../infrastructure/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../../infrastructure/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../infrastructure/monitoring/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ../../infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - cdb_prometheus
      - cdb_postgres
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cdb_network

  cdb_postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: cdb_postgres_exporter
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-claire_user}
      POSTGRES_DB: ${POSTGRES_DB:-claire_de_binare}
    secrets:
      - postgres_password
    entrypoint: ["/bin/sh", "-c"]
    command: ["DATA_SOURCE_NAME=\"host=cdb_postgres port=5432 user=$${POSTGRES_USER} dbname=$${POSTGRES_DB} password=$$(cat /run/secrets/postgres_password | tr -d '\\n') sslmode=disable\" exec /bin/postgres_exporter"]
    depends_on:
      - cdb_postgres
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9187/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cdb_network

  cdb_redis_exporter:
    image: bitnami/redis-exporter:latest
    container_name: cdb_redis_exporter
    restart: unless-stopped
    secrets:
      - redis_password
    entrypoint: ["/bin/sh", "-c"]
    command: ["exec redis_exporter --redis.addr=redis://cdb_redis:6379 --redis.password=$$(cat /run/secrets/redis_password | tr -d '\\n')"]
    depends_on:
      - cdb_redis
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - cdb_network

  cdb_cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    container_name: cdb_cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - cdb_network

  cdb_node_exporter:
    image: prom/node-exporter:v1.8.1
    container_name: cdb_node_exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    pid: host
    networks:
      - cdb_network

# Secrets from Single Source of Truth
# Path set via SECRETS_PATH environment variable (default: ~/Documents/.secrets/.cdb)
secrets:
  redis_password:
    file: ${SECRETS_PATH}/REDIS_PASSWORD
  postgres_password:
    file: ${SECRETS_PATH}/POSTGRES_PASSWORD
  postgres_password_dsn:
    file: ${SECRETS_PATH}/POSTGRES_PASSWORD_DSN
  grafana_password:
    file: ${SECRETS_PATH}/GRAFANA_PASSWORD
  smtp_user:
    file: ${SECRETS_PATH}/SMTP_USER
  smtp_password:
    file: ${SECRETS_PATH}/SMTP_PASSWORD
  smtp_from:
    file: ${SECRETS_PATH}/SMTP_FROM
  alert_email_to:
    file: ${SECRETS_PATH}/ALERT_EMAIL_TO
  mexc_api_key:
    file: ${SECRETS_PATH}/MEXC_API_KEY.txt
  mexc_api_secret:
    file: ${SECRETS_PATH}/MEXC_API_SECRET.txt

volumes:
  redis_data:
  postgres_data:
  prom_data:
  grafana_data:
  validation_data:

networks:
  cdb_network:
    driver: bridge
