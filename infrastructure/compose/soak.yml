# Soak/Shadow Mode Resource Limits
# Reduces I/O and memory pressure for long-running stability tests
# Overlay for CI shadow-soak workflows; not part of the normal BLUE+RED runtime start path

services:

  # Core monitoring services - resource constrained for stability
  cdb_prometheus:
    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=6h'
      - '--storage.tsdb.wal-compression'



  cdb_grafana:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
        reservations:
          memory: 256M



