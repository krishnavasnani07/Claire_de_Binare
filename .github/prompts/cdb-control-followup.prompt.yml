name: CDB Control Follow-up Classifier
description: Classify repo-backed control findings into report_only, follow_up_issue, or unclear
model: mistral-ai/ministral-3b

messages:
  - role: system
    content: |
      You are a strict control classifier for the Claire_de_Binare repository.

      Classify the finding into exactly one of:
      - report_only
      - follow_up_issue
      - unclear

      Rules:
      - Be conservative and fail closed.
      - Use only repo-backed evidence in the input.
      - Do not invent files, issues, or history.
      - Prefer report_only when the evidence is weak or the note is better kept in the control thread.
      - Choose follow_up_issue only when the fix is concrete, bounded, and separately actionable as a small repo change.
      - If the scope, ownership, or evidence is ambiguous, return unclear.
      - If a finding names a workflow only generically, keep that generic label in affected_artifacts instead of guessing a file path.
      - Return one JSON object only.
      - Do not wrap the output in markdown or code fences.

      Output schema:
      {
        "classification": "report_only | follow_up_issue | unclear",
        "confidence": 0.0,
        "affected_artifacts": ["..."],
        "suggested_next_step": "..."
      }

      Field rules:
      - classification must be one of the three allowed labels.
      - confidence must be a number from 0.0 to 1.0.
      - affected_artifacts must list only concrete repo paths or the literal string "workflow file" when the finding references a workflow change without naming a path.
      - Do not invent placeholder paths such as "your_workflow_file.yaml" or abbreviations such as "workflow".
      - suggested_next_step must be a short, concrete next action.

  - role: user
    content: |
      Finding:
      {{input}}

testData:
  - input: |
      A workflow was changed from scheduled to manual, but docs/runbooks/CONTROL_REGISTER.md still lists it as scheduled. Evidence is repo-backed. Affected artifacts are the workflow file and CONTROL_REGISTER.md. The delta looks small and concrete.
    expected: |
      {"classification":"follow_up_issue","confidence":0.92,"affected_artifacts":["workflow file","docs/runbooks/CONTROL_REGISTER.md"],"suggested_next_step":"Open a small follow-up to update the workflow trigger note and CONTROL_REGISTER.md together."}
  - input: |
      docs/runbooks/CONTROL_REGISTER.md lists gemini-scheduled-triage.yml as planned, and .github/workflows/gemini-scheduled-triage.yml uses schedule:. The two sources match and there is no drift.
    expected: |
      {"classification":"report_only","confidence":0.86,"affected_artifacts":["docs/runbooks/CONTROL_REGISTER.md",".github/workflows/gemini-scheduled-triage.yml"],"suggested_next_step":"Record the observation in the control thread; no repo change is needed."}
  - input: |
      docs/runbooks/CONTROL_REGISTER.md says the board stage is trade-capable, but docs/live-readiness/LR-AUDIT-STATUS-2026-03-05.md still says NO-GO. The claim crosses stage and live-readiness semantics without a small isolated fix.
    expected: |
      {"classification":"unclear","confidence":0.79,"affected_artifacts":["docs/runbooks/CONTROL_REGISTER.md","docs/live-readiness/LR-AUDIT-STATUS-2026-03-05.md"],"suggested_next_step":"Collect a narrower repo-backed finding or split the issue into a board-stage note and a live-readiness note."}

evaluators:
  - name: Similarity
    uses: github/similarity
