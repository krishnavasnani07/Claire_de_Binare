name: Live Readiness Issue
description: Echtgeld Live Readiness Task
body:
  - type: textarea
    id: goal
    attributes:
      label: Ziel
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope / Nicht-Ziel
  - type: textarea
    id: pass
    attributes:
      label: Pass-Kriterien
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence (Links, Logs, Metrics)
      required: true
  - type: dropdown
    id: go
    attributes:
      label: Go/No-Go Relevanz
      options: [GO, NO-GO, BLOCKER]
