name: Feature Request
description: Propose a new feature or enhancement
title: '[Feature] '
labels: ['type:feature', 'prio:nice']
body:
  - type: input
    id: title
    attributes:
      label: Feature Title
      description: Short and concrete title
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What concrete problem should be solved
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Smallest viable approach
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - scope:core
        - scope:infra
        - scope:ci
        - scope:docs
        - scope:security
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - prio:should (High)
        - prio:must (Critical)
        - prio:nice (Low)
    validations:
      required: false
