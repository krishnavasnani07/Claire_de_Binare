name: Bug Report
description: Report a bug or issue
title: '[Bug] '
labels: ['type:bug', 'prio:should']
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line bug summary
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal reproducible steps
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Actual Behavior / Impact
      description: What happens and why it matters
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - scope:core
        - scope:infra
        - scope:ci
        - scope:docs
        - scope:security
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - prio:should (High)
        - prio:must (Blocker)
        - prio:nice (Low)
    validations:
      required: false
