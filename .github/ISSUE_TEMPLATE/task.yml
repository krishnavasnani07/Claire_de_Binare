
name: Task
description: Standard task (DoD required, merge-gated closure)
title: "SCOPE - Phase N - Meta"
labels: ["task"]
body:
  - type: input
    id: scope
    attributes:
      label: Scope
      description: Short scope identifier (e.g. STACK, SECURITY, CI)
      placeholder: "SECURITY"
    validations:
      required: true

  - type: input
    id: phase
    attributes:
      label: Phase
      description: Roadmap phase number
      placeholder: "1"
    validations:
      required: true

  - type: textarea
    id: what_why
    attributes:
      label: What / Why
      description: What is changing and why?
    validations:
      required: true

  - type: textarea
    id: closure_bookkeeping
    attributes:
      label: Closure / Bookkeeping
      description: Required repo updates before the issue may be closed
      value: |
        - [ ] Changes are merged successfully into the target branch before closing the issue
        - [ ] `CURRENT_STATUS.md` updated
        - [ ] `knowledge/CURRENT_STATUS.md` updated when the mirror needs reconciliation
        - [ ] Append-only ledger entry added under `knowledge/agent_trust/ledger/`
        - [ ] `docs/runbooks/CONTROL_REGISTER.md` updated only if control-board stage, operating focus, or control surfaces change
    validations:
      required: true

  - type: textarea
    id: dod
    attributes:
      label: Definition of Done
      description: Concrete, checkable items
      value: |
        - [ ] Change implemented
        - [ ] Tests/validation run
        - [ ] Docs updated where needed
        - [ ] Issue stays open until the merged result is on the target branch
    validations:
      required: true
