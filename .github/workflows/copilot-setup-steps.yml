name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # MUST be exactly this job name so Copilot picks it up
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Python toolchain for this repo (services are python:3.11-slim)
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps (if present)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          fi

      # Optional: Node only if you really have JS tooling
      - name: Setup Node (optional)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps (if present)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          fi

      # Cheap sanity: confirm workflow context + versions
      - name: Smoke info
        shell: bash
        run: |
          python --version
          node --version || true
          docker --version
