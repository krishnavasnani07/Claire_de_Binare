# .github/workflows/required-checks-audit.yml
name: required-checks-audit (Sentinel)

on:
  workflow_dispatch:

permissions:
  checks: read
  contents: read
  pull-requests: read

concurrency:
  group: required-checks-audit-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  audit:
    name: required-checks-audit (Sentinel)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      SHA: ${{ github.sha }}
    steps:
      - name: Audit required check status
        shell: bash
        run: |
          set -u

          event_name="${GITHUB_EVENT_NAME}"
          deadline=$((SECONDS + 780)) # 13 min
          sleep_seconds=10
          summary_file="${GITHUB_STEP_SUMMARY:-}"

          required_checks=(
            "policy-gate"
            "ci (Unit/Integration + Lint gesammelt)"
          )

          echo "Sentinel mode: audit-only"
          echo "Event: $event_name"
          echo "SHA: $SHA"
          echo "Scope: run on the PR head ref/SHA you want to audit."
          echo "Required checks: ${required_checks[*]}"

          if [[ -n "$summary_file" ]]; then
            {
              echo "## Sentinel Summary"
              echo
              echo "- Mode: \`audit-only\`"
              echo "- Event: \`$event_name\`"
              echo "- SHA: \`$SHA\`"
              echo "- Scope: run on the PR head ref/SHA you want to audit."
              echo "- Behavior: warnings + summary only; never blocks."
              echo
              echo "| Check | Final state | Detail |"
              echo "| --- | --- | --- |"
            } >> "$summary_file"
          fi

          ok_count=0
          pending_count=0
          missing_count=0
          failed_count=0
          timeout_count=0

          for required_check in "${required_checks[@]}"; do
            final_state=""
            final_detail=""

            while true; do
              if ! json="$(gh api -H "Accept: application/vnd.github+json" \
                "/repos/$REPO/commits/$SHA/check-runs?per_page=100" 2>&1)"; then
                echo "::warning::gh api failed while checking '$required_check': $json"
                if [[ $SECONDS -ge $deadline ]]; then
                  final_state="TIMEOUT"
                  final_detail="gh api call failed until deadline"
                  break
                fi
                sleep "$sleep_seconds"
                continue
              fi

              check_json="$(
                jq -c --arg n "$required_check" \
                  '[.check_runs[] | select(.name == $n)] | sort_by(.started_at // "") | last // {}' \
                  <<<"$json"
              )"
              status="$(jq -r '.status // "__MISSING__"' <<<"$check_json")"
              conclusion="$(jq -r '.conclusion // ""' <<<"$check_json" | tr '[:lower:]' '[:upper:]')"
              details_url="$(jq -r '.details_url // .html_url // empty' <<<"$check_json")"

              if [[ "$status" == "__MISSING__" ]]; then
                echo "MISSING: $required_check (no check run observed yet)"
                if [[ $SECONDS -ge $deadline ]]; then
                  final_state="MISSING"
                  final_detail="no check run observed before deadline"
                  break
                fi
                sleep "$sleep_seconds"
                continue
              fi

              if [[ "$status" != "completed" ]]; then
                echo "PENDING: $required_check (status=$status)"
                if [[ $SECONDS -ge $deadline ]]; then
                  final_state="TIMEOUT"
                  final_detail="status=$status before deadline"
                  break
                fi
                sleep "$sleep_seconds"
                continue
              fi

              if [[ "$conclusion" != "SUCCESS" ]]; then
                final_state="FAILED"
                final_detail="conclusion=${conclusion:-UNKNOWN}"
              else
                final_state="OK"
                final_detail="conclusion=SUCCESS"
              fi

              if [[ -n "$details_url" ]]; then
                final_detail="$final_detail; url=$details_url"
              fi
              break
            done

            case "$final_state" in
              OK)
                ok_count=$((ok_count + 1))
                echo "OK: $required_check ($final_detail)"
                ;;
              MISSING)
                missing_count=$((missing_count + 1))
                echo "::warning::$required_check -> MISSING ($final_detail)"
                ;;
              FAILED)
                failed_count=$((failed_count + 1))
                echo "::warning::$required_check -> FAILED ($final_detail)"
                ;;
              TIMEOUT)
                timeout_count=$((timeout_count + 1))
                echo "::warning::$required_check -> TIMEOUT ($final_detail)"
                ;;
              *)
                pending_count=$((pending_count + 1))
                final_state="PENDING"
                final_detail="${final_detail:-unexpected state}"
                echo "::warning::$required_check -> PENDING ($final_detail)"
                ;;
            esac

            if [[ -n "$summary_file" ]]; then
              safe_detail="${final_detail//|/\\|}"
              echo "| \`$required_check\` | \`$final_state\` | $safe_detail |" >> "$summary_file"
            fi
          done

          if [[ -n "$summary_file" ]]; then
            {
              echo
              echo "- Totals: OK=$ok_count, PENDING=$pending_count, MISSING=$missing_count, FAILED=$failed_count, TIMEOUT=$timeout_count"
              echo "- Mode behavior: \`audit-only\` always exits 0."
            } >> "$summary_file"
          fi

          echo "Sentinel completed in audit-only mode."
