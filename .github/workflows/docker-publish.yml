
name: Build & Push Containers (GHCR)

on:
  push:
    branches: ["main", "release/*"]
    paths:
      - "Dockerfile"
      - "services/**/Dockerfile"
      - "infrastructure/compose/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - name: cdb_core
            dockerfile: services/signal/Dockerfile
            context: .
          - name: cdb_risk
            dockerfile: services/risk/Dockerfile
            context: .
          - name: cdb_execution
            dockerfile: services/execution/Dockerfile
            context: .
          - name: cdb_db_writer
            dockerfile: services/db_writer/Dockerfile
            context: .
          - name: cdb_ws
            dockerfile: services/ws/Dockerfile
            context: .

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Set image repo name
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          echo "REPO_NAME_LOWER=$(echo "$repo" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR) or Build+Push (main)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.REPO_NAME_LOWER }}-${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.REPO_NAME_LOWER }}-${{ matrix.service.name }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
