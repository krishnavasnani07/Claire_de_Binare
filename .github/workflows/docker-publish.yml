
name: Build & Push Containers (GHCR)

on:
  push:
    branches: ["main", "release/*"]
    paths:
      - "Dockerfile"
      - "services/**/Dockerfile"
      - "infrastructure/compose/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - name: cdb_core
            dockerfile: services/signal/Dockerfile
            context: .
          - name: cdb_risk
            dockerfile: services/risk/Dockerfile
            context: .
          - name: cdb_execution
            dockerfile: services/execution/Dockerfile
            context: .
          - name: cdb_db_writer
            dockerfile: services/db_writer/Dockerfile
            context: .
          - name: cdb_ws
            dockerfile: services/ws/Dockerfile
            context: .

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Set image repo name
        run: |
          repo="${GITHUB_REPOSITORY#*/}"
          echo "REPO_NAME_LOWER=$(echo "$repo" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR) or Build+Push (main)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.REPO_NAME_LOWER }}-${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.REPO_NAME_LOWER }}-${{ matrix.service.name }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
