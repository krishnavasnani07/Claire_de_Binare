name: Auto Milestone PR Apply

on:
  workflow_run:
    workflows: ["Auto Milestone PR Intent"]
    types: [completed]

permissions:
  actions: read
  issues: write
  contents: read

env:
  DEFAULT_MILESTONE_TITLE: INBOX
  FALLBACK_TOKEN: ${{ secrets.CDB_PR_AUTOMATION_TOKEN }}

jobs:
  apply-pr-milestone:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download PR intent artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pr_event
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: pr_event_artifact

      - name: Apply milestone to PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const defaultMilestoneTitle = process.env.DEFAULT_MILESTONE_TITLE;
            const fallbackToken = process.env.FALLBACK_TOKEN || "";
            const { owner, repo } = context.repo;
            const workflowRun = context.payload.workflow_run;
            const fs = require("fs");
            const artifactPath = "pr_event_artifact/pr_event.json";

            function logPermissionWarning(error, action) {
              const status = error?.status ?? error?.response?.status;
              const accepted = error?.response?.headers?.["x-accepted-github-permissions"];
              const message = error?.response?.data?.message || error?.message || "unknown error";

              core.warning(
                `${action} skipped: ${message}${status ? ` (status ${status})` : ""}${accepted ? ` [accepted permissions: ${accepted}]` : ""}`
              );
            }

            function isDownscopedIntegrationError(error) {
              const status = error?.status ?? error?.response?.status;
              const message = (error?.response?.data?.message || error?.message || "").toLowerCase();
              return status === 403 && message.includes("resource not accessible by integration");
            }

            async function ghFetch(token, method, path, body) {
              const url = `https://api.github.com${path}`;
              const res = await fetch(url, {
                method,
                headers: {
                  "Authorization": `Bearer ${token}`,
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "Content-Type": "application/json",
                },
                body: body ? JSON.stringify(body) : undefined,
              });
              const text = await res.text();
              let data;
              try {
                data = text ? JSON.parse(text) : null;
              } catch {
                data = text;
              }

              if (!res.ok) {
                throw new Error(`Fallback API ${method} ${path} failed: ${res.status} ${res.statusText} :: ${text}`);
              }

              return data;
            }

            function milestoneLabelTitles(labels) {
              const titles = (labels || [])
                .map(label => typeof label === "string" ? label : label.name)
                .filter(Boolean)
                .map(name => name.trim())
                .filter(name => /^milestone:\s*.+/i.test(name))
                .map(name => name.replace(/^milestone:\s*/i, "").trim())
                .filter(Boolean);

              return [...new Set(titles)].sort((left, right) =>
                left.localeCompare(right, "en", { sensitivity: "base" })
              );
            }

            async function listOpenMilestones() {
              const milestones = await github.paginate(github.rest.issues.listMilestones, {
                owner,
                repo,
                state: "open",
                per_page: 100,
              });

              return new Map(
                milestones.map(milestone => [milestone.title.trim().toLowerCase(), milestone])
              );
            }

            let prEvent;
            try {
              if (!fs.existsSync(artifactPath)) {
                core.warning(`No pr_event.json found at ${artifactPath} for workflow_run ${workflowRun.id}.`);
                return;
              }

              const artifactJson = fs.readFileSync(artifactPath, "utf8");
              core.info(`pr_event.json read successfully from ${artifactPath}`);
              prEvent = JSON.parse(artifactJson);
            } catch (error) {
              logPermissionWarning(error, `Artifact read for workflow_run ${workflowRun.id}`);
              return;
            }

            if (!prEvent) {
              return;
            }

            const issueNumber = Number(prEvent.pr_number);
            const action = String(prEvent.action || "");
            const eventLabelName = String(prEvent.label || "").trim();
            const headRepoFullName = String(prEvent.head_repo || "");
            const baseRepoFullName = String(prEvent.base_repo || "");

            core.info(
              `workflow_run path active: runId=${workflowRun.id} conclusion=${workflowRun.conclusion || "<none>"} pr=${issueNumber}`
            );
            core.info(
              `PR path active: issueNumber=${issueNumber} headRepo=${headRepoFullName || "<none>"} baseRepo=${baseRepoFullName || "<none>"}`
            );

            if (!issueNumber) {
              core.warning("Could not determine the PR number from pr_event artifact.");
              return;
            }

            if (!headRepoFullName || !baseRepoFullName || headRepoFullName !== baseRepoFullName) {
              core.info("Fork PR; skip");
              return;
            }

            core.info("same-repo guard passed.");
            core.info(
              `Auto Milestone PR Apply event: action=${action || "<none>"} label=${eventLabelName || "<none>"} issueNumber=${issueNumber}`
            );

            if (action === "labeled" && !/^milestone:\s*.+/i.test(eventLabelName)) {
              core.info("Non-milestone label event; skipping.");
              return;
            }

            let useFallbackApi = false;
            let liveItem;
            core.info("Using GITHUB_TOKEN");

            async function readIssue() {
              const { data } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: issueNumber,
              });

              return data;
            }

            try {
              liveItem = await readIssue();
            } catch (error) {
              if (!isDownscopedIntegrationError(error)) {
                logPermissionWarning(error, `Read for #${issueNumber}`);
                return;
              }

              if (!fallbackToken) {
                core.warning(
                  "PR apply blocked (GITHUB_TOKEN downscoped) and no CDB_PR_AUTOMATION_TOKEN configured. Skipping."
                );
                return;
              }

              core.info("Retrying PR apply with CDB_PR_AUTOMATION_TOKEN");
              useFallbackApi = true;

              try {
                liveItem = await ghFetch(
                  fallbackToken,
                  "GET",
                  `/repos/${owner}/${repo}/issues/${issueNumber}`
                );
              } catch (fallbackError) {
                logPermissionWarning(fallbackError, `Fallback read for #${issueNumber}`);
                return;
              }
            }

            if (liveItem.state !== "open") {
              core.info(`#${issueNumber} is not open. Skipping.`);
              return;
            }

            const labelMilestones = milestoneLabelTitles(liveItem.labels);
            if (action === "labeled") {
              if (labelMilestones.length === 0) {
                core.info("No milestone label present after labeled event; skipping.");
                return;
              }

              if (labelMilestones.length > 1) {
                core.warning(
                  `#${issueNumber} has multiple milestone:<...> labels (${labelMilestones.join(", ")}); ambiguous. Skipping.`
                );
                return;
              }
            }

            const milestonesByTitle = useFallbackApi
              ? new Map(
                  (await ghFetch(
                    fallbackToken,
                    "GET",
                    `/repos/${owner}/${repo}/milestones?state=open&per_page=100`
                  )).map(milestone => [milestone.title.trim().toLowerCase(), milestone])
                )
              : await listOpenMilestones();
            const currentMilestone = liveItem.milestone || null;
            const currentTitle = currentMilestone ? currentMilestone.title.trim() : null;
            const currentTitleLower = currentTitle ? currentTitle.toLowerCase() : null;
            const inboxTitleLower = defaultMilestoneTitle.trim().toLowerCase();

            let targetTitle;
            if (action === "labeled") {
              targetTitle = labelMilestones[0];
            } else if (["opened", "reopened", "synchronize"].includes(action)) {
              if (currentMilestone) {
                core.info(
                  `#${issueNumber} already has milestone "${currentMilestone.title}". Skipping default assignment.`
                );
                return;
              }

              targetTitle = defaultMilestoneTitle;
            } else {
              core.info(`Unsupported PR action "${action || "<none>"}"; skipping.`);
              return;
            }

            const target = milestonesByTitle.get(targetTitle.trim().toLowerCase());
            if (!target) {
              core.warning(
                `Could not resolve target milestone "${targetTitle}" for #${issueNumber}: open milestone does not exist. Leaving item unchanged.`
              );
              return;
            }

            const targetTitleLower = target.title.trim().toLowerCase();
            if (currentTitleLower === targetTitleLower) {
              core.info(`#${issueNumber} already has milestone "${target.title}".`);
              return;
            }

            if (action === "labeled") {
              if (currentTitleLower === inboxTitleLower) {
                core.info(`Overriding INBOX -> ${target.title} due to milestone label.`);
              } else if (currentMilestone) {
                core.warning(
                  `#${issueNumber} already has non-INBOX milestone "${currentMilestone.title}". Skipping overwrite from label milestone:${targetTitle}.`
                );
                return;
              }
            }

            core.info(`Milestone write attempt: target="${target.title}" issueNumber=${issueNumber}`);

            try {
              if (useFallbackApi) {
                await ghFetch(
                  fallbackToken,
                  "PATCH",
                  `/repos/${owner}/${repo}/issues/${issueNumber}`,
                  { milestone: target.number }
                );
              } else {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  milestone: target.number,
                });
              }
            } catch (error) {
              logPermissionWarning(error, `Milestone update for #${issueNumber}`);
              return;
            }

            core.info(`Milestone set to "${target.title}" for #${issueNumber}.`);
