name: Shadow + Soak Evidence

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Soak / collection profile (not runtime mode)"
        required: true
        default: full
        type: choice
        options:
          - full
          - lean
  schedule:
    - cron: "0 2 * * *"
    - cron: "30 2 * * 0"

env:
  SECRETS_PATH: ${{ github.workspace }}/.ci-secrets
  STACK_NAME: shadow-soak-${{ github.run_id }}
  FULL_SOAK_MINUTES: 30
  LEAN_SOAK_MINUTES: 5

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  shadow-soak-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Resolve soak profile
        id: soak-mode
        shell: bash
        run: |
          set -euo pipefail
          soak_profile="full"

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule || '' }}" == "0 2 * * *" ]]; then
              soak_profile="lean"
            else
              soak_profile="full"
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            soak_profile="${{ github.event.inputs.mode || 'full' }}"
          fi

          case "$soak_profile" in
            lean)
              soak_minutes="${LEAN_SOAK_MINUTES}"
              build_stack="false"
              ;;
            full)
              soak_minutes="${FULL_SOAK_MINUTES}"
              build_stack="true"
              ;;
            *)
              echo "::error::Unsupported soak profile: ${soak_profile}"
              exit 1
              ;;
          esac

          echo "soak_profile=${soak_profile}" >> "$GITHUB_OUTPUT"
          echo "soak_minutes=${soak_minutes}" >> "$GITHUB_OUTPUT"
          echo "build_stack=${build_stack}" >> "$GITHUB_OUTPUT"

          {
            echo "## Shadow+Soak Profile"
            echo ""
            echo "- soak_profile: ${soak_profile}"
            echo "- soak_minutes: ${soak_minutes}"
            echo "- build_stack: ${build_stack}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Preflight required secrets (REAL vs STUB)
        id: preflight
        shell: bash
        env:
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          MEXC_API_KEY: ${{ secrets.MEXC_API_KEY }}
          MEXC_API_SECRET: ${{ secrets.MEXC_API_SECRET }}
        run: |
          set -euo pipefail
          required=(SMTP_FROM SMTP_HOST SMTP_USER SMTP_PASSWORD ALERT_EMAIL_TO MEXC_API_KEY MEXC_API_SECRET)
          missing=()

          for secret_name in "${required[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              missing+=("$secret_name")
            fi
          done

          e2e_mode="REAL"
          if [[ ${#missing[@]} -gt 0 ]]; then
            e2e_mode="STUB"
          fi

          missing_csv="none"
          if [[ ${#missing[@]} -gt 0 ]]; then
            missing_csv="$(IFS=,; echo "${missing[*]}")"
          fi

          protected_context="false"
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            protected_context="true"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" && ( "${GITHUB_EVENT_NAME}" == "push" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ) ]]; then
            protected_context="true"
          fi

          echo "e2e_mode=${e2e_mode}" >> "$GITHUB_OUTPUT"
          echo "missing_secrets=${missing_csv}" >> "$GITHUB_OUTPUT"
          echo "protected_context=${protected_context}" >> "$GITHUB_OUTPUT"

          {
            echo "## Shadow+Soak Preflight"
            echo ""
            echo "- e2e_mode: ${e2e_mode}"
            echo "- protected_context: ${protected_context}"
            echo "- missing_secrets: ${missing_csv}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail closed on protected STUB mode
        if: steps.preflight.outputs.protected_context == 'true' && steps.preflight.outputs.e2e_mode == 'STUB'
        shell: bash
        run: |
          echo "::error::Protected run cannot use STUB MODE. Missing secrets: ${{ steps.preflight.outputs.missing_secrets }}"
          exit 1

      - name: Mark non-protected STUB mode
        if: steps.preflight.outputs.protected_context != 'true' && steps.preflight.outputs.e2e_mode == 'STUB'
        shell: bash
        run: |
          echo "::warning::NON-BLOCKING / STUB ONLY. Missing secrets: ${{ steps.preflight.outputs.missing_secrets }}"
          {
            echo ""
            echo "### NON-BLOCKING / STUB ONLY"
            echo "- Context is not protected."
            echo "- Missing required secrets: ${{ steps.preflight.outputs.missing_secrets }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Init evidence directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence

      - name: Create CI secrets
        shell: bash
        env:
          SMTP_FROM_SECRET: ${{ secrets.SMTP_FROM }}
          SMTP_HOST_SECRET: ${{ secrets.SMTP_HOST }}
          SMTP_USER_SECRET: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD_SECRET: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_TO_SECRET: ${{ secrets.ALERT_EMAIL_TO }}
          MEXC_API_KEY_SECRET: ${{ secrets.MEXC_API_KEY }}
          MEXC_API_SECRET_SECRET: ${{ secrets.MEXC_API_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p "$SECRETS_PATH"
          REDIS_VAL="${{ secrets.REDIS_PASSWORD != '' && secrets.REDIS_PASSWORD || 'ci-redis-password' }}"
          POSTGRES_VAL="${{ secrets.POSTGRES_PASSWORD != '' && secrets.POSTGRES_PASSWORD || 'ci-postgres-password' }}"
          GRAFANA_VAL="${{ secrets.GRAFANA_PASSWORD != '' && secrets.GRAFANA_PASSWORD || 'ci-grafana-password' }}"
          SMTP_USER_VAL="${SMTP_USER_SECRET:-}"
          SMTP_PASSWORD_VAL="${SMTP_PASSWORD_SECRET:-}"
          SMTP_FROM_VAL="${SMTP_FROM_SECRET:-}"
          SMTP_HOST_VAL="${SMTP_HOST_SECRET:-}"
          ALERT_EMAIL_TO_VAL="${ALERT_EMAIL_TO_SECRET:-}"
          MEXC_API_KEY_VAL="${MEXC_API_KEY_SECRET:-}"
          MEXC_API_SECRET_VAL="${MEXC_API_SECRET_SECRET:-}"

          if [[ "${{ steps.preflight.outputs.e2e_mode }}" == "STUB" ]]; then
            SMTP_USER_VAL="stub"
            SMTP_PASSWORD_VAL="stub"
            SMTP_FROM_VAL="ci-stub@example.invalid"
            SMTP_HOST_VAL="stub"
            ALERT_EMAIL_TO_VAL="ci-stub@example.invalid"
            MEXC_API_KEY_VAL="ci-mexc-key"
            MEXC_API_SECRET_VAL="ci-mexc-secret"
          fi

          echo "$REDIS_VAL" > "$SECRETS_PATH/REDIS_PASSWORD"
          echo "$POSTGRES_VAL" > "$SECRETS_PATH/POSTGRES_PASSWORD"
          echo "postgresql://claire_user:${POSTGRES_VAL}@cdb_postgres:5432/claire_de_binare?sslmode=disable" > "$SECRETS_PATH/POSTGRES_PASSWORD_DSN"
          echo "$GRAFANA_VAL" > "$SECRETS_PATH/GRAFANA_PASSWORD"
          echo "$SMTP_USER_VAL" > "$SECRETS_PATH/SMTP_USER"
          echo "$SMTP_PASSWORD_VAL" > "$SECRETS_PATH/SMTP_PASSWORD"
          echo "$SMTP_FROM_VAL" > "$SECRETS_PATH/SMTP_FROM"
          echo "$SMTP_HOST_VAL" > "$SECRETS_PATH/SMTP_HOST"
          echo "$ALERT_EMAIL_TO_VAL" > "$SECRETS_PATH/ALERT_EMAIL_TO"
          echo "$MEXC_API_KEY_VAL" > "$SECRETS_PATH/MEXC_API_KEY.txt"
          echo "$MEXC_API_SECRET_VAL" > "$SECRETS_PATH/MEXC_API_SECRET.txt"
          chmod 600 "$SECRETS_PATH"/*

      - name: Create deterministic override
        shell: bash
        run: |
          set -euo pipefail
          ws_source="mexc_pb"
          if [[ "${{ steps.preflight.outputs.e2e_mode }}" == "STUB" ]]; then
            ws_source="stub"
          fi
          override_file="$RUNNER_TEMP/shadow-soak-override.yml"
          cat > "$override_file" <<EOF
          services:
            cdb_grafana:
              user: "0"
            cdb_ws:
              user: "0"
              environment:
                WS_SOURCE: ${ws_source}
            cdb_signal:
              user: "0"
              environment:
                SIGNAL_STRATEGY_ID: primary_breakout_v1
                SIGNAL_ADAPTER_ID: momentum_builtin
                SIGNAL_ENTRY_LOOKBACK_MIN: "240"
                SIGNAL_EXIT_LOOKBACK_MIN: "120"
                SIGNAL_BREAKOUT_BUFFER: "0.0005"
                SIGNAL_MIN_MINUTES_BETWEEN_ENTRIES: "60"
                SIGNAL_TRADE_SIDE_MODE: long_only
            cdb_candles:
              user: "0"
            cdb_allocation:
              user: "0"
            cdb_regime:
              user: "0"
            cdb_risk:
              user: "0"
              environment:
                # Shadow remains probe / intent / evidence semantics in this workflow.
                TRADING_MODE: shadow
                TRACE_CONTRACT_V1_ENABLED: "1"
            cdb_execution:
              user: "0"
              environment:
                # Canonical runtime-mode is read later from execution_status.mode.
                # For the current shadow-prereq path it must resolve to "mock".
                MOCK_TRADING: "true"
                TRADING_MODE: shadow
                TRACE_CONTRACT_V1_ENABLED: "1"
                USE_REAL_BALANCE: "false"
            cdb_db_writer:
              user: "0"
            cdb_paper_runner:
              user: "0"
              environment:
                PAPER_TRADING_DURATION_DAYS: "1"
            cdb_reports:
              profiles: ["ci-disabled"]
          EOF
          echo "OVERRIDE_FILE=$override_file" >> "$GITHUB_ENV"

      - name: Start stack
        shell: bash
        run: |
          set -euo pipefail
          build_args=()
          if [[ "${{ steps.soak-mode.outputs.build_stack }}" == "true" ]]; then
            build_args+=(--build)
          fi
          docker compose -f infrastructure/compose/base.yml -f infrastructure/compose/dev.yml -f "$OVERRIDE_FILE" up -d "${build_args[@]}"

      - name: Wait for services healthy
        shell: bash
        run: |
          set -euo pipefail
          required_services=(
            cdb_redis
            cdb_postgres
            cdb_prometheus
            cdb_grafana
            cdb_ws
            cdb_signal
            cdb_risk
            cdb_execution
          )
          deadline=$((SECONDS + 300))
          while true; do
            all_ok=1
            for svc in "${required_services[@]}"; do
              health=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{end}}' "$svc" 2>/dev/null || echo missing)
              if [ -z "$health" ] || [ "$health" = "missing" ]; then
                state=$(docker inspect -f '{{.State.Status}}' "$svc" 2>/dev/null || echo missing)
                if [ "$state" != "running" ]; then
                  all_ok=0
                fi
              elif [ "$health" != "healthy" ]; then
                all_ok=0
              fi
            done
            if [ "$all_ok" -eq 1 ]; then
              break
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "Health check timeout"
              docker compose -f infrastructure/compose/base.yml -f infrastructure/compose/dev.yml -f "$OVERRIDE_FILE" ps
              exit 1
            fi
            sleep 5
          done

      - name: Soak window
        shell: bash
        run: |
          set -euo pipefail
          soak_minutes="${{ steps.soak-mode.outputs.soak_minutes }}"
          soak_seconds=$((soak_minutes * 60))
          echo "Soaking for ${soak_minutes} minutes..."
          sleep "$soak_seconds"

      - name: Capture runtime-mode proof
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/endpoints
          # Canonical runtime-mode is execution_status.mode. The workflow-level
          # full/lean labels are soak profiles only and are not runtime modes.
          # For the current shadow-prereq path, execution_status.mode must be "mock".
          exec_status_rc=0
          curl --connect-timeout 5 --max-time 15 -fsS http://127.0.0.1:8003/status \
            -o evidence/endpoints/execution_status.json || exec_status_rc=$?
          if [ "$exec_status_rc" -ne 0 ]; then
            echo "EVIDENCE-FETCH-FAILED: execution_status (http://127.0.0.1:8003/status) curl_exit=${exec_status_rc}" \
              > evidence/endpoints/execution_status.json
            echo "::warning::execution_status fetch failed (rc=$exec_status_rc)"
          fi
          # Risk service: status including circuit_breaker
          risk_status_rc=0
          curl --connect-timeout 5 --max-time 15 -fsS http://127.0.0.1:8002/status \
            -o evidence/endpoints/risk_status.json || risk_status_rc=$?
          if [ "$risk_status_rc" -ne 0 ]; then
            echo "EVIDENCE-FETCH-FAILED: risk_status (http://127.0.0.1:8002/status) curl_exit=${risk_status_rc}" \
              > evidence/endpoints/risk_status.json
            echo "::warning::risk_status fetch failed (rc=$risk_status_rc)"
          fi

      - name: Run deterministic shadow block probe
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          probe_order_id="ci-shadow-probe-${GITHUB_RUN_ID}"

          # Read REDIS_PASSWORD from container secret (docker exec bypasses entrypoint)
          redis_pw=$(docker exec cdb_execution cat /run/secrets/redis_password 2>/dev/null || echo "")

          probe_rc=0
          docker exec -i \
            -e PROBE_ORDER_ID="$probe_order_id" \
            -e REDIS_PASSWORD="$redis_pw" \
            cdb_execution python -u - <<'PY' > evidence/shadow_block_probe.json || probe_rc=$?
          import json
          import os
          import sys
          import time

          import redis

          order_id = os.environ["PROBE_ORDER_ID"]
          print(f"[probe] order_id={order_id}", file=sys.stderr)

          client = redis.Redis(
              host=os.getenv("REDIS_HOST", "cdb_redis"),
              port=int(os.getenv("REDIS_PORT", "6379")),
              password=os.getenv("REDIS_PASSWORD") or None,
              decode_responses=True,
          )
          client.ping()
          print("[probe] redis connected", file=sys.stderr)

          pubsub = client.pubsub(ignore_subscribe_messages=True)
          pubsub.subscribe("order_results")
          time.sleep(0.5)

          payload = {
              "type": "order",
              "symbol": "BTCUSDT",
              "side": "BUY",
              "quantity": 0.001,
              "strategy_id": "shadow-probe",
              "bot_id": "shadow-probe",
              "client_id": order_id,
              "timestamp": int(time.time()),
              "signal_id": f"sig-{order_id}",
              "decision_id": f"dec-{order_id}",
              "order_id": order_id,
              "trace_id": f"trace-{order_id}",
              "run_mode": "shadow",
              "decision_contract_v1": {
                  "input": {
                      "run_mode": "shadow",
                      "order": {
                          "symbol": "BTCUSDT",
                          "side": "BUY",
                          "quantity": 0.001,
                      },
                  },
                  "output": {},
              },
          }

          publish_subscribers = client.publish(
              "orders", json.dumps(payload, ensure_ascii=False)
          )
          print(f"[probe] published to 'orders', subscribers={publish_subscribers}", file=sys.stderr)
          deadline = time.time() + 20
          pubsub_result = None

          while time.time() < deadline:
              message = pubsub.get_message(timeout=1.0)
              if not message or message.get("type") != "message":
                  continue
              try:
                  data = json.loads(message["data"])
              except json.JSONDecodeError:
                  continue
              if data.get("order_id") == order_id:
                  pubsub_result = data
                  break

          pubsub.close()

          stream_entry_id = None
          stream_result = None
          try:
              for entry_id, values in client.xrevrange("stream.order_results", count=50):
                  if values.get("order_id") == order_id:
                      stream_entry_id = entry_id
                      stream_result = values
                      break
          except Exception as exc:
              stream_result = {"stream_lookup_error": str(exc)}

          order_result = pubsub_result or stream_result
          order_result_source = (
              "pubsub" if pubsub_result else "stream" if stream_entry_id else None
          )
          print(f"[probe] result_source={order_result_source}", file=sys.stderr)

          print(
              json.dumps(
                  {
                      "schema_version": "1.0",
                      "probe_order_id": order_id,
                      "publish_subscribers": publish_subscribers,
                      "probe_payload": payload,
                      "order_result_found": order_result_source is not None,
                      "order_result_source": order_result_source,
                      "order_result": order_result,
                      "stream_order_result_found": stream_entry_id is not None,
                      "stream_order_result_id": stream_entry_id,
                      "stream_order_result": stream_result,
                      "error": None if order_result_source is not None else "shadow_probe_result_missing",
                  },
                  ensure_ascii=False,
              )
          )
          PY

          echo "[probe] docker exec exit code: $probe_rc"

          if [ "$probe_rc" -ne 0 ] || [ ! -s evidence/shadow_block_probe.json ]; then
            echo "::warning::Shadow probe docker exec failed (rc=$probe_rc), writing fallback stub"
            cat > evidence/shadow_block_probe.json <<EOF
          {
            "schema_version": "1.0",
            "probe_order_id": "${probe_order_id}",
            "order_result_found": false,
            "order_result_source": null,
            "stream_order_result_found": false,
            "stream_order_result_id": null,
            "stream_order_result": null,
            "error": "shadow_probe_exec_failed"
          }
          EOF
          fi

          echo "--- shadow_block_probe.json ---"
          cat evidence/shadow_block_probe.json

      - name: Verify endpoints
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/endpoints
          check_url() {
            name="$1"
            url="$2"
            ext="$3"
            out="evidence/endpoints/${name}.${ext}"
            if ! curl --connect-timeout 5 --max-time 15 -fsS "$url" -o "$out"; then
              echo "Endpoint check failed: $name ($url)"
              exit 1
            fi
          }
          check_optional_url() {
            name="$1"
            url="$2"
            ext="$3"
            out="evidence/endpoints/${name}.${ext}"
            if ! curl --connect-timeout 5 --max-time 15 -fsS "$url" -o "$out"; then
              echo "Optional endpoint unavailable: $name ($url)"
              return 0
            fi
          }
          check_url prometheus_healthy http://127.0.0.1:19090/-/healthy txt
          check_url prometheus_targets http://127.0.0.1:19090/api/v1/targets json
          check_url grafana_health http://127.0.0.1:3000/api/health json
          check_url ws_health http://127.0.0.1:8000/health json
          check_url signal_health http://127.0.0.1:8005/health json
          check_optional_url candles_health http://127.0.0.1:8007/health json
          check_optional_url allocation_health http://127.0.0.1:8006/health json
          check_optional_url regime_health http://127.0.0.1:8008/health json
          check_optional_url paper_runner_health http://127.0.0.1:8004/health json
          check_optional_url postgres_exporter_metrics http://127.0.0.1:9187/metrics txt
          check_optional_url redis_exporter_metrics http://127.0.0.1:9121/metrics txt

      - name: Capture evidence
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          mkdir -p evidence
          required_services=(
            cdb_redis
            cdb_postgres
            cdb_prometheus
            cdb_grafana
            cdb_ws
            cdb_signal
            cdb_risk
            cdb_execution
          )
          optional_services=(
            cdb_postgres_exporter
            cdb_redis_exporter
            cdb_candles
            cdb_allocation
            cdb_regime
            cdb_db_writer
            cdb_paper_runner
            cdb_reports
          )
          docker compose -f infrastructure/compose/base.yml -f infrastructure/compose/dev.yml -f "$OVERRIDE_FILE" ps > evidence/compose_ps.txt || true
          docker inspect cdb_redis cdb_postgres cdb_prometheus cdb_grafana cdb_postgres_exporter cdb_redis_exporter cdb_ws cdb_signal cdb_candles cdb_allocation cdb_regime cdb_risk cdb_execution cdb_db_writer cdb_paper_runner cdb_reports > evidence/container_inspect.json || true
          docker compose -f infrastructure/compose/base.yml -f infrastructure/compose/dev.yml -f "$OVERRIDE_FILE" logs --tail=200 > evidence/logs_tail.txt || true
          # LR-031: Post-soak endpoint snapshots (metrics + status, evaluated run state).
          # Failure to fetch is itself evidence — marker files include endpoint
          # name and curl exit code so missing data is obvious in the artifact.
          mkdir -p evidence/endpoints
          snapshot_endpoint() {
            local name="$1" url="$2" ext="$3"
            local out="evidence/endpoints/${name}.${ext}"
            local rc=0
            curl --connect-timeout 5 --max-time 15 -fsS "$url" -o "$out" || rc=$?
            if [ "$rc" -ne 0 ]; then
              echo "EVIDENCE-FETCH-FAILED: ${name} (${url}) curl_exit=${rc}" > "$out"
              echo "::warning::Post-soak snapshot failed: ${name} (${url}) curl_exit=${rc}"
            fi
          }
          snapshot_endpoint execution_metrics http://127.0.0.1:8003/metrics txt
          snapshot_endpoint risk_metrics     http://127.0.0.1:8002/metrics txt
          # execution_status + risk_status: captured earlier in "Capture runtime-mode proof"
          # step (pre-probe steady-state). Not re-fetched here to avoid competing sources.
          grep -i "error" evidence/logs_tail.txt > evidence/logs_grep.txt || true
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          end_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          required_rows=""
          optional_rows=""
          gate_pass=1
          for svc in "${required_services[@]}"; do
            health=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{end}}' "$svc" 2>/dev/null || echo missing)
            if [ -z "$health" ] || [ "$health" = "missing" ]; then
              state=$(docker inspect -f '{{.State.Status}}' "$svc" 2>/dev/null || echo missing)
              status="${state}"
              if [ "$state" != "running" ]; then
                gate_pass=0
              fi
            else
              status="${health}"
              if [ "$health" != "healthy" ]; then
                gate_pass=0
              fi
            fi
            required_rows="${required_rows}| ${svc} | ${status} |"$'\n'
          done
          for svc in "${optional_services[@]}"; do
            health=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{end}}' "$svc" 2>/dev/null || echo missing)
            if [ -z "$health" ] || [ "$health" = "missing" ]; then
              state=$(docker inspect -f '{{.State.Status}}' "$svc" 2>/dev/null || echo missing)
              status="${state}"
            else
              status="${health}"
            fi
            optional_rows="${optional_rows}| ${svc} | ${status} |"$'\n'
          done
          # Validate canonical runtime-mode from pre-probe execution_status capture.
          if [ -f evidence/endpoints/execution_status.json ]; then
            exec_mode=$(python3 -c "import json,pathlib; d=json.loads(pathlib.Path('evidence/endpoints/execution_status.json').read_text()); print(d.get('mode','UNKNOWN'))" 2>/dev/null || echo "PARSE_ERROR")
            if [ "$exec_mode" != "mock" ]; then
              echo "::error::execution_status.mode is '$exec_mode', expected 'mock'"
              gate_pass=0
            fi
          else
            echo "::error::execution_status.json missing before run_summary generation"
            gate_pass=0
          fi
          gate_status="FAIL"
          if [ "$gate_pass" -eq 1 ]; then
            gate_status="PASS"
          fi
          # run_summary records the soak / collection profile only.
          # Runtime-mode remains anchored in endpoints/execution_status.json.
          cat > evidence/run_summary.json <<EOF
          {
            "run_id": "${GITHUB_RUN_ID}",
            "run_url": "${run_url}",
            "ref": "${GITHUB_REF}",
            "commit": "${GITHUB_SHA}",
            "status": "${JOB_STATUS}",
            "gate_status": "${gate_status}",
            "soak_profile": "${{ steps.soak-mode.outputs.soak_profile }}",
            "soak_minutes": ${{ steps.soak-mode.outputs.soak_minutes }},
            "ended_at": "${end_time}"
          }
          EOF
          cat > evidence/run_summary.md <<EOF
          # Shadow + Soak Evidence Summary

          ## Gate Status: ${gate_status}
          Required services must be healthy (or running if no healthcheck).

          ### REQUIRED_HEALTHY
          | Service | Status |
          | --- | --- |
          ${required_rows}

          ### OPTIONAL_RUNNING
          | Service | Status |
          | --- | --- |
          ${optional_rows}

          - Run: ${run_url}
          - Ref: ${GITHUB_REF}
          - Commit: ${GITHUB_SHA}
          - Status: ${JOB_STATUS}
          - Soak profile: ${{ steps.soak-mode.outputs.soak_profile }}
          - Soak minutes: ${{ steps.soak-mode.outputs.soak_minutes }}
          - Ended: ${end_time}

          Artifacts:
          - compose_ps.txt
          - container_inspect.json
          - endpoints/*
          - logs_tail.txt
          - logs_grep.txt
          - run_summary.json
          EOF

      - name: Generate evidence index
        if: always()
        shell: bash
        run: |
          python infrastructure/scripts/generate_evidence_index.py evidence/
          echo "--- evidence_index.json ---"
          cat evidence/evidence_index.json

      - name: Evaluate shadow soak gate
        if: always()
        shell: bash
        run: |
          python infrastructure/scripts/soak_gate_eval.py evidence/
          echo "--- soak_gate_eval.json ---"
          cat evidence/soak_gate_eval.json

      - name: Compare shadow metrics against baseline
        if: always()
        id: shadow-compare
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python infrastructure/scripts/shadow_metrics_compare.py evidence/ \
            --thresholds docs/evidence/lr031_baseline_thresholds.json
          rc=$?
          set -e
          if [ -f evidence/shadow_metrics_comparison.json ]; then
            VERDICT=$(python -c "import json; print(json.load(open('evidence/shadow_metrics_comparison.json'))['verdict'])")
          else
            VERDICT="MISSING"
          fi
          echo "comparison_verdict=${VERDICT}" >> "$GITHUB_OUTPUT"
          echo "LR-031 Comparison Verdict: ${VERDICT}"
          echo "--- shadow_metrics_comparison.json ---"
          cat evidence/shadow_metrics_comparison.json 2>/dev/null || echo "(not produced)"

      - name: Build canonical evidence package
        if: always()
        id: package
        shell: bash
        run: |
          set -euo pipefail
          python infrastructure/scripts/build_shadow_evidence_package.py evidence/
          package_id=$(python -c "import json, pathlib; print(json.loads(pathlib.Path('evidence/package_manifest.json').read_text(encoding='utf-8'))['package_id'])")
          echo "package_id=${package_id}" >> "$GITHUB_OUTPUT"
          echo "--- package_manifest.json ---"
          cat evidence/package_manifest.json
          echo "--- package_validation.json ---"
          cat evidence/package_validation.json

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: shadow-soak-evidence-${{ github.run_id }}
          path: evidence/
          retention-days: 7
          if-no-files-found: warn

      - name: Teardown
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f infrastructure/compose/base.yml -f infrastructure/compose/dev.yml -f "$OVERRIDE_FILE" down -v
