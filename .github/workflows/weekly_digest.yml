name: Weekly Project Digest
on:
  schedule:
    # Monday 08:00 UTC (~09:00 CET / 10:00 CEST Europe/Berlin; DST shifts)
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-digest
  cancel-in-progress: true

jobs:
  weekly-digest:
    runs-on: ubuntu-latest
    permissions: {}
    env:
      GH_TOKEN: ${{ secrets.ADD_TO_PROJECT_PAT }}
      PROJECT_OWNER: jannekbuengener
      PROJECT_NUMBER: "8"
      VIEW_NOW_URL: https://github.com/users/jannekbuengener/projects/8/views/10
      VIEW_EINGANG_URL: https://github.com/users/jannekbuengener/projects/8/views/18
      VIEW_PR_REVIEW_URL: https://github.com/users/jannekbuengener/projects/8/views/17
    steps:
      - name: Create weekly digest issue (idempotent)
        shell: bash
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY}"
          today_utc="$(date -u +%F)"
          week_key="$(date -u +%G-W%V)"
          digest_title="Weekly Digest – ${today_utc}"
          digest_title_prefix="Weekly Digest – "
          digest_marker="<!-- cdb-weekly-digest:${week_key} -->"

          graphql_call() {
            local payload="$1"
            printf '%s' "$payload" | gh api graphql --input -
          }

          graphql_require_no_errors() {
            local json="$1"
            local context="$2"
            if jq -e '.errors and (.errors | length > 0)' >/dev/null 2>&1 <<<"$json"; then
              echo "GraphQL errors while ${context}:" >&2
              jq -r '.errors[]?.message // empty' <<<"$json" >&2 || true
              if jq -e '[.errors[]?.message | ascii_downcase] | any(.[]; contains("rate limit"))' >/dev/null 2>&1 <<<"$json"; then
                echo "Hint: GitHub GraphQL rate limit reached. Retry later or use workflow_dispatch once quota resets." >&2
              fi
              if jq -e '[.errors[]?.message | ascii_downcase] | any(.[]; contains("resource not accessible") or contains("forbidden"))' >/dev/null 2>&1 <<<"$json"; then
                echo "Hint: Check ADD_TO_PROJECT_PAT scopes (repo + project) and repository/project access." >&2
              fi
              exit 1
            fi
          }

          has_label() {
            local labels_json="$1"
            local needle="$2"
            jq -e --arg needle "$needle" 'any(.[]; . == $needle)' >/dev/null 2>&1 <<<"$labels_json"
          }

          render_top_list() {
            local heading="$1"
            local items_json="$2"
            {
              echo "### ${heading}"
              if [[ "$(jq -r 'length' <<<"$items_json")" == "0" ]]; then
                echo "- _Keine Einträge_"
              else
                jq -r '.[] | "- [#\(.number) \(.title)](\(.url))"' <<<"$items_json"
              fi
              echo
            }
          }

          count_open_with_status() {
            local target_status="$1"
            jq -r --arg s "$target_status" '
              [
                .[]
                | select((.state | ascii_upcase) == "OPEN")
                | select(.status == $s)
              ] | length
            ' <<<"$project_items_json"
          }

          count_open_with_label() {
            local target_label="$1"
            jq -r --arg l "$target_label" '
              [
                .[]
                | select((.state | ascii_upcase) == "OPEN")
                | select((.labels // []) | any(.[]; . == $l))
              ] | length
            ' <<<"$project_items_json"
          }

          existing_issue_json="$(
            gh api --paginate --slurp "repos/${repo}/issues?state=all&per_page=100" \
              | jq -c --arg t "$digest_title" --arg marker "$digest_marker" '
                  map(.[])
                  | map(select(
                      (has("pull_request") | not)
                      and (
                        (.title == $t)
                        or ((.body // "") | contains($marker))
                      )
                    ))
                  | sort_by(.created_at // "")
                  | reverse
                  | .[0] // empty
                '
          )"

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "GH_TOKEN is empty. Configure secrets.ADD_TO_PROJECT_PAT (Classic PAT with repo + project)." >&2
            exit 1
          fi

          if ! auth_login="$(gh api user --jq '.login' 2>/dev/null)"; then
            echo "Auth preflight failed. Ensure ADD_TO_PROJECT_PAT is valid and accessible in this workflow context." >&2
            exit 1
          fi

          preflight_query='query($owner:String!,$number:Int!){
            user(login:$owner){
              projectV2(number:$number){
                id
                title
                fields(first:100){
                  nodes{
                    __typename
                    ... on ProjectV2SingleSelectField {
                      id
                      name
                      options { id name }
                    }
                  }
                }
              }
            }
          }'

          preflight_payload="$(jq -nc \
            --arg q "$preflight_query" \
            --arg owner "$PROJECT_OWNER" \
            --arg number "$PROJECT_NUMBER" \
            '{query:$q,variables:{owner:$owner,number:($number|tonumber)}}'
          )"
          preflight_json="$(graphql_call "$preflight_payload")"
          graphql_require_no_errors "$preflight_json" "project preflight (owner=${PROJECT_OWNER}, number=${PROJECT_NUMBER})"

          project_id="$(jq -r '.data.user.projectV2.id // empty' <<<"$preflight_json")"
          if [[ -z "$project_id" ]]; then
            echo "Project preflight failed: Project #${PROJECT_NUMBER} for ${PROJECT_OWNER} not found or inaccessible." >&2
            echo "Check project number/owner and ADD_TO_PROJECT_PAT scopes (repo + project)." >&2
            exit 1
          fi

          status_field_options_json="$(jq -c '
            [
              .data.user.projectV2.fields.nodes[]
              | select(.name == "Status" and .__typename == "ProjectV2SingleSelectField")
              | .options[]?.name
            ] | unique
          ' <<<"$preflight_json")"
          if [[ "$(jq -r 'length' <<<"$status_field_options_json")" == "0" ]]; then
            echo "Project preflight failed: Status single-select field not found in Project #${PROJECT_NUMBER}." >&2
            exit 1
          fi
          for required_status in "In Progress" "Review" "Blocked"; do
            if ! jq -e --arg s "$required_status" 'any(.[]; . == $s)' >/dev/null 2>&1 <<<"$status_field_options_json"; then
              echo "Project preflight failed: Status option '$required_status' missing in Project #${PROJECT_NUMBER}." >&2
              exit 1
            fi
          done

          echo "Preflight OK: auth=${auth_login}, project=${PROJECT_OWNER}#${PROJECT_NUMBER}, week=${week_key}"

          items_query='query($owner:String!,$number:Int!,$after:String){
            user(login:$owner){
              projectV2(number:$number){
                items(first:100, after:$after){
                  pageInfo { hasNextPage endCursor }
                  nodes{
                    fieldValueByName(name:"Status"){
                      __typename
                      ... on ProjectV2ItemFieldSingleSelectValue { name }
                    }
                    content{
                      __typename
                      ... on Issue {
                        id
                        number
                        title
                        url
                        state
                        updatedAt
                        repository { nameWithOwner }
                        labels(first:100){ nodes{ name } }
                      }
                      ... on PullRequest {
                        id
                        number
                        title
                        url
                        state
                        updatedAt
                        repository { nameWithOwner }
                        labels(first:100){ nodes{ name } }
                      }
                    }
                  }
                }
              }
            }
          }'

          project_items_json='[]'
          cursor=""
          page_count=0
          max_pages=50

          while :; do
            page_count=$((page_count + 1))
            if (( page_count > max_pages )); then
              echo "Exceeded max project item pages (${max_pages})." >&2
              exit 1
            fi

            items_payload="$(jq -nc \
              --arg q "$items_query" \
              --arg owner "$PROJECT_OWNER" \
              --arg number "$PROJECT_NUMBER" \
              --arg after "$cursor" \
              '{query:$q,variables:{owner:$owner,number:($number|tonumber),after:(if $after=="" then null else $after end)}}'
            )"
            items_json="$(graphql_call "$items_payload")"
            graphql_require_no_errors "$items_json" "loading project items (page ${page_count})"

            page_entries_json="$(jq -c --arg repo "$repo" --arg digest_prefix "$digest_title_prefix" '
              [
                .data.user.projectV2.items.nodes[]
                | select(.content != null)
                | select((.content.__typename == "Issue") or (.content.__typename == "PullRequest"))
                | select((.content.repository.nameWithOwner // "") == $repo)
                # Exclude prior weekly digest issues from metrics to avoid self-inflation.
                | select(((.content.title // "") | startswith($digest_prefix)) | not)
                | {
                    type: .content.__typename,
                    number: .content.number,
                    title: (.content.title // ""),
                    url: .content.url,
                    state: (.content.state | tostring),
                    updatedAt: (.content.updatedAt // ""),
                    status: (.fieldValueByName.name // ""),
                    labels: ([.content.labels.nodes[]?.name | select(type == "string" and length > 0)] | unique)
                  }
              ]
            ' <<<"$items_json")"

            project_items_json="$(
              printf '%s\n' "$project_items_json" "$page_entries_json" |
              jq -sc '.[0] + .[1]'
            )"

            has_next="$(jq -r '.data.user.projectV2.items.pageInfo.hasNextPage // false' <<<"$items_json")"
            if [[ "$has_next" != "true" ]]; then
              break
            fi

            cursor="$(jq -r '.data.user.projectV2.items.pageInfo.endCursor // empty' <<<"$items_json")"
            if [[ -z "$cursor" ]]; then
              break
            fi
          done

          total_project_repo_items="$(jq -r 'length' <<<"$project_items_json")"
          open_items_json="$(jq -c '[ .[] | select((.state | ascii_upcase) == "OPEN") ]' <<<"$project_items_json")"
          open_issue_count="$(jq -r '[.[] | select(.type == "Issue")] | length' <<<"$open_items_json")"
          open_pr_count="$(jq -r '[.[] | select(.type == "PullRequest")] | length' <<<"$open_items_json")"
          open_total_count="$(jq -r 'length' <<<"$open_items_json")"

          now_items_json="$(jq -c '
            [
              .[]
              | select((.state | ascii_upcase) == "OPEN")
              | select(.status == "In Progress" or .status == "Review" or .status == "Blocked")
            ]
          ' <<<"$project_items_json")"
          pr_review_items_json="$(jq -c '
            [
              .[]
              | select(.type == "PullRequest")
              | select((.state | ascii_upcase) == "OPEN")
              | select(.status == "Review")
            ]
          ' <<<"$project_items_json")"
          eingang_items_json="$(jq -c '
            [
              .[]
              | select((.state | ascii_upcase) == "OPEN")
              | select((.labels // []) | any(.[]; . == "triage:offen"))
            ]
          ' <<<"$project_items_json")"

          now_count="$(jq -r 'length' <<<"$now_items_json")"
          blocked_count="$(jq -r '[.[] | select(.status == "Blocked")] | length' <<<"$now_items_json")"
          eingang_count="$(jq -r 'length' <<<"$eingang_items_json")"
          pr_review_count="$(jq -r 'length' <<<"$pr_review_items_json")"
          status_backlog_count="$(count_open_with_status "Backlog")"
          status_ready_count="$(count_open_with_status "Ready")"
          status_in_progress_count="$(count_open_with_status "In Progress")"
          status_review_count="$(count_open_with_status "Review")"
          status_blocked_count="$(count_open_with_status "Blocked")"
          status_done_count="$(count_open_with_status "Done")"
          stage_proof_count="$(count_open_with_label "stage:proof")"
          stage_stability_count="$(count_open_with_label "stage:stability")"
          stage_trade_count="$(count_open_with_label "stage:trade-capable")"
          stage_validated_count="$(count_open_with_label "stage:strategy-validated")"
          stage_monetization_count="$(count_open_with_label "stage:monetization")"
          stage_scale_count="$(count_open_with_label "stage:scale")"

          top_review_json="$(jq -c '
            [ .[] | select((.state | ascii_upcase) == "OPEN") | select(.status == "Review") ]
            | sort_by(.updatedAt) | reverse | .[:5]
          ' <<<"$project_items_json")"
          top_in_progress_json="$(jq -c '
            [ .[] | select((.state | ascii_upcase) == "OPEN") | select(.status == "In Progress") ]
            | sort_by(.updatedAt) | reverse | .[:5]
          ' <<<"$project_items_json")"
          top_triage_json="$(jq -c '
            [ .[] | select((.state | ascii_upcase) == "OPEN") | select((.labels // []) | any(.[]; . == "triage:offen")) ]
            | sort_by(.updatedAt) | reverse | .[:5]
          ' <<<"$project_items_json")"

          if (( blocked_count > 0 || eingang_count > 0 )); then
            risks_section="$(
              {
                echo "## Risiken"
                if (( blocked_count > 0 )); then
                  echo "- \`${blocked_count}\` Item(s) sind im Status \`Blocked\` (siehe View \`IST-ZUSTAND\`)."
                fi
                if (( eingang_count > 0 )); then
                  echo "- \`${eingang_count}\` offene Item(s) liegen im \`EINGANG\` ohne Milestone (\`triage:offen\`)."
                fi
              }
            )"
          else
            risks_section=$'## Risiken\n- Keine akuten Signale aus `Blocked` oder `EINGANG`.'
          fi

          now_in_progress_count="$(jq -r '[.[] | select(.status == "In Progress")] | length' <<<"$now_items_json")"
          now_review_count="$(jq -r '[.[] | select(.status == "Review")] | length' <<<"$now_items_json")"

          body="$(
            {
              echo "# Weekly Digest – ${today_utc}"
              echo
              echo "${digest_marker}"
              echo
              echo "Kurzbericht zum CDB Control Board (Project #8) für offene Repo-Items."
              echo
              echo "## Views"
              echo "- IST-ZUSTAND (Now): ${VIEW_NOW_URL}"
              echo "- EINGANG: ${VIEW_EINGANG_URL}"
              echo "- PR REVIEW: ${VIEW_PR_REVIEW_URL}"
              echo
              echo "## Counts"
              echo "- IST-ZUSTAND (Now, open / In Progress+Review+Blocked): ${now_count}"
              echo "  - In Progress: ${now_in_progress_count}"
              echo "  - Review: ${now_review_count}"
              echo "  - Blocked: ${blocked_count}"
              echo "- EINGANG (open + triage:offen): ${eingang_count}"
              echo "- PR REVIEW (open PRs + Status Review): ${pr_review_count}"
              echo "- Project Repo-Items (gesamt im Board, Repo-only): ${total_project_repo_items}"
              echo
              render_top_list "Top 5 Review (updated desc)" "$top_review_json"
              render_top_list "Top 5 In Progress (updated desc)" "$top_in_progress_json"
              render_top_list "Top 5 EINGANG / triage:offen (updated desc)" "$top_triage_json"
              echo "$risks_section"
            }
          )"

          if [[ -n "${existing_issue_json:-}" ]]; then
            issue_number="$(jq -r '.number // empty' <<<"$existing_issue_json")"
            issue_title_existing="$(jq -r '.title // empty' <<<"$existing_issue_json")"
            update_title="${issue_title_existing:-$digest_title}"
            update_payload="$(jq -nc --arg title "$update_title" --arg body "$body" '{title:$title, body:$body}')"
            update_resp="$(printf '%s' "$update_payload" | gh api --method PATCH "repos/${repo}/issues/${issue_number}" --input -)"
            issue_url="$(jq -r '.html_url // empty' <<<"$update_resp")"
            action_result="updated"
          else
            create_payload="$(jq -nc --arg title "$digest_title" --arg body "$body" '{title:$title, body:$body}')"
            create_resp="$(printf '%s' "$create_payload" | gh api --method POST "repos/${repo}/issues" --input -)"
            issue_url="$(jq -r '.html_url // empty' <<<"$create_resp")"
            issue_number="$(jq -r '.number // empty' <<<"$create_resp")"
            action_result="created"
          fi

          if [[ -z "$issue_url" || -z "$issue_number" ]]; then
            echo "Digest issue ${action_result} response returned no issue URL/number." >&2
            exit 1
          fi

          echo "Weekly digest ${action_result}: #${issue_number} ${issue_url}"
          echo "Summary: open_items(issues=${open_issue_count}, prs=${open_pr_count}, total=${open_total_count}); now=${now_count}, blocked=${blocked_count}, eingang=${eingang_count}, pr_review=${pr_review_count}"
          echo "Status summary (open): backlog=${status_backlog_count}, ready=${status_ready_count}, in_progress=${status_in_progress_count}, review=${status_review_count}, blocked=${status_blocked_count}, done=${status_done_count}"
          echo "Stage summary (open): proof=${stage_proof_count}, stability=${stage_stability_count}, trade_capable=${stage_trade_count}, strategy_validated=${stage_validated_count}, monetization=${stage_monetization_count}, scale=${stage_scale_count}"

          current_state="$(gh api "repos/${repo}/issues/${issue_number}" --jq '.state')"
          if [[ "$current_state" == "open" ]]; then
            gh issue close "${issue_number}" \
              --repo "${repo}" \
              --reason "not planned" \
              --comment "Generated reporting artifact. Closed intentionally to keep the open issue list focused on actionable work. Weekly digest history remains preserved in the issue body/workflow."
            echo "Digest issue #${issue_number} closed (reporting artifact)."
          else
            echo "Digest issue #${issue_number} already closed (state=${current_state}), skipping."
          fi
