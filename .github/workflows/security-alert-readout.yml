name: Security Alert Readout

# Generates a machine-readable GitHub security alert readout (code_scanning,
# dependabot, secret_scanning) and computes a delta against the most recent
# previous readout.  Runs Mon/Wed/Fri; always available for manual dispatch.
#
# Artifacts-only mode (default): readout and delta are uploaded as GitHub Actions
# artifacts (retention: 30 days).  No direct commit to main is attempted.
# Optional: trigger workflow_dispatch with persist_via_pr=true to create a branch
# + PR that persists the readout to the repo.  No auto-merge.  No direct push.
#
# Background: the direct-push publish path was removed after run 25632071704
# failed with GH006 (protected branch — changes must be made via PR).  See
# fix/security-readout-disable-direct-publish-2289 for details.
#
# Refs: #2289 (security alert monitoring epic)
# Related scripts:
#   scripts/audit/github_security_quality_readout.py  (read-only fetcher)
#   scripts/audit/security_alert_delta.py             (delta comparator)

on:
  schedule:
    - cron: "15 6 * * 1"  # Monday   06:15 UTC
    - cron: "15 6 * * 3"  # Wednesday 06:15 UTC
    - cron: "15 6 * * 5"  # Friday   06:15 UTC
  workflow_dispatch:
    inputs:
      publish_mode:
        description: "artifacts-only (dry_run); see persist_via_pr for repo persistence"
        required: false
        default: dry_run
        type: choice
        options:
          - dry_run
      persist_via_pr:
        description: "Create a branch + PR to persist the readout to the repo (no auto-merge, no direct push to main)"
        required: false
        default: "false"
        type: boolean
      issue_automation_live:
        description: "Enable live mode for issue-automation job (creates real GitHub issues). Defaults to false (dry-run). Scheduled runs always use dry-run."
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read           # no repo writes; read-only checkout
  security-events: read    # code_scanning alert API

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-readout:
    runs-on: ubuntu-latest
    outputs:
      date_dir:       ${{ steps.resolve.outputs.date_dir }}
      readout_status: ${{ steps.status.outputs.readout_status }}
      delta_status:   ${{ steps.status.outputs.delta_status }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          pip install --quiet -r requirements.txt

      - name: Resolve publish mode and readout paths
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          # Publish mode is always dry_run (artifacts-only).
          # Direct push to main is not compatible with branch protection.
          # Repository persistence requires a separate PR-based follow-up slice.
          publish_mode="dry_run"

          date_dir="docs/security/readouts/$(date -u +%Y-%m-%d)"

          # Find the most recent previous readout JSON (exclude today's dir).
          prev_json=""
          while IFS= read -r dir; do
            candidate="${dir}/github_security_quality_readout.json"
            if [[ "$dir" != "$date_dir" && -f "$candidate" ]]; then
              prev_json="$candidate"
              break
            fi
          done < <(find docs/security/readouts -mindepth 1 -maxdepth 1 -type d \
                    | sort -r)

          {
            echo "publish_mode=$publish_mode"
            echo "date_dir=$date_dir"
            echo "current_json=${date_dir}/github_security_quality_readout.json"
            echo "prev_json=$prev_json"
          } >> "$GITHUB_OUTPUT"

      - name: Run security alert readout
        env:
          GH_TOKEN: ${{ secrets.CDB_GH_ALERTS_TOKEN != '' && secrets.CDB_GH_ALERTS_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail

          date_dir="${{ steps.resolve.outputs.date_dir }}"
          mkdir -p "$date_dir"

          set +e
          python3 scripts/audit/github_security_quality_readout.py \
            --repo "${GITHUB_REPOSITORY}" \
            --out-dir "$date_dir"
          READOUT_EXIT=$?
          set -e

          if [[ $READOUT_EXIT -eq 1 ]]; then
            echo "::error::Readout script failed; no readable alert surfaces were available."
            exit 1
          fi

          if [[ $READOUT_EXIT -eq 2 ]]; then
            echo "READOUT_STATUS=partial" >> "$GITHUB_ENV"
            echo "::warning::Security Alert Readout: PARTIAL readout written; unavailable surfaces will be compared fail-closed."
          elif [[ $READOUT_EXIT -ne 0 ]]; then
            echo "::error::Readout script failed with unexpected exit code $READOUT_EXIT."
            exit 1
          else
            echo "READOUT_STATUS=ok" >> "$GITHUB_ENV"
          fi

          echo "Readout written to $date_dir"
          ls -lh "$date_dir"

      - name: Run alert delta comparison
        shell: bash
        run: |
          set -euo pipefail

          current_json="${{ steps.resolve.outputs.current_json }}"
          prev_json="${{ steps.resolve.outputs.prev_json }}"
          delta_dir="artifacts/security-alert-readout/delta"
          mkdir -p "$delta_dir"

          if [[ -z "$prev_json" ]]; then
            echo "No previous readout found — first run; skipping delta." \
              | tee -a "$delta_dir/no_prev_readout.txt"
            echo "DELTA_STATUS=first_run" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Comparing: prev=$prev_json  current=$current_json"

          # Exit code 0 = ok, 1 = error, 2 = escalation_needed
          set +e
          python3 scripts/audit/security_alert_delta.py \
            --prev-readout  "$prev_json" \
            --current-readout "$current_json" \
            --out-dir "$delta_dir"
          DELTA_EXIT=$?
          set -e

          if [[ $DELTA_EXIT -eq 1 ]]; then
            echo "::error::Delta script failed (input error). See logs above."
            exit 1
          fi

          if [[ $DELTA_EXIT -eq 2 ]]; then
            echo "DELTA_STATUS=escalation_needed" >> "$GITHUB_ENV"
          else
            echo "DELTA_STATUS=ok" >> "$GITHUB_ENV"
          fi

      - name: Write step summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          date_dir="${{ steps.resolve.outputs.date_dir }}"
          delta_dir="artifacts/security-alert-readout/delta"

          {
            echo "## Security Alert Readout — $(date -u +%Y-%m-%d)"
            echo ""
            echo "**Repo:** \`${GITHUB_REPOSITORY}\`"
            echo "**Publish mode:** \`${{ steps.resolve.outputs.publish_mode }}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Readout summary
          summary_md="${date_dir}/github_security_quality_summary.md"
          if [[ -f "$summary_md" ]]; then
            cat "$summary_md" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Delta artifact (JSON only by design)
          delta_json="${delta_dir}/security_alert_delta.json"
          if [[ -f "$delta_json" ]]; then
            echo "> **Delta artifact:** JSON only by design. See \`artifacts/security-alert-readout/delta/security_alert_delta.json\` in the uploaded artifacts." \
              >> "$GITHUB_STEP_SUMMARY"
          elif [[ -f "${delta_dir}/no_prev_readout.txt" ]]; then
            echo "> **Note:** No previous readout found — delta skipped (first run)." \
              >> "$GITHUB_STEP_SUMMARY"
          fi

          # Escalation annotation
          if [[ "${DELTA_STATUS:-ok}" == "escalation_needed" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "---" >> "$GITHUB_STEP_SUMMARY"
            echo ":rotating_light: **New Critical/High open alerts detected — manual triage required.**" \
              >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Security Alert Readout: escalation_needed=true — new Critical/High open alerts found."
          fi

      - name: Upload readout artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-alert-readout-${{ github.run_number }}
          path: |
            ${{ steps.resolve.outputs.date_dir }}/
            artifacts/security-alert-readout/
          if-no-files-found: warn
          retention-days: 30

      - name: Expose job outputs
        id: status
        if: always()
        shell: bash
        run: |
          echo "readout_status=${READOUT_STATUS:-unknown}" >> "$GITHUB_OUTPUT"
          echo "delta_status=${DELTA_STATUS:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Upload readout for persist handoff
        if: inputs.persist_via_pr == true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: readout-persist-${{ github.run_id }}
          path: ${{ steps.resolve.outputs.date_dir }}/
          if-no-files-found: error
          retention-days: 1

  persist-via-pr:
    runs-on: ubuntu-latest
    needs: security-readout
    if: github.event_name == 'workflow_dispatch' && inputs.persist_via_pr == true
    permissions:
      contents: write      # create branch + commit
      pull-requests: write # open PR
    env:
      DATE_DIR:        ${{ needs.security-readout.outputs.date_dir }}
      READOUT_STATUS:  ${{ needs.security-readout.outputs.readout_status }}
      DELTA_STATUS:    ${{ needs.security-readout.outputs.delta_status }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Download readout artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: readout-persist-${{ github.run_id }}
          path: /tmp/security-readout-handoff

      - name: Create branch, commit, push and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          DATE="${DATE_DIR##*/}"
          if [[ ! "$DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::Invalid DATE derived from DATE_DIR: DATE_DIR=${DATE_DIR} DATE=${DATE}"
            exit 1
          fi
          BRANCH_NAME="chore/security-readout/${DATE}"
          PR_TITLE="chore(security): persist alert readout ${DATE}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Check for an open PR for this date branch.
          EXISTING_PR=$(gh pr list \
            --head "${BRANCH_NAME}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [[ -n "${EXISTING_PR}" ]]; then
            # Open PR exists: check out its branch and update with new readout files.
            echo "Open PR #${EXISTING_PR} found for ${BRANCH_NAME} — updating instead of skipping."
            if git ls-remote --exit-code --heads origin "${BRANCH_NAME}" > /dev/null 2>&1; then
              git fetch origin "${BRANCH_NAME}"
              git checkout -b "${BRANCH_NAME}" "origin/${BRANCH_NAME}"
            else
              # Remote branch gone but PR still open — fail closed, manual cleanup needed.
              echo "::error::Remote branch ${BRANCH_NAME} not found but PR #${EXISTING_PR} is open. Manual cleanup required."
              exit 1
            fi
          else
            # No open PR. Guard against orphaned remote branch (closed PR, branch not deleted).
            if git ls-remote --exit-code --heads origin "${BRANCH_NAME}" > /dev/null 2>&1; then
              echo "::error::Remote branch ${BRANCH_NAME} exists but no open PR found. Manual cleanup required before retrying."
              exit 1
            fi
            git checkout -b "${BRANCH_NAME}"
          fi

          # Copy readout files from temp handoff into the worktree now that the correct branch is checked out.
          HANDOFF_DIR="/tmp/security-readout-handoff"
          if [[ ! -d "${HANDOFF_DIR}" ]] || [[ -z "$(ls -A "${HANDOFF_DIR}")" ]]; then
            echo "::error::Handoff directory ${HANDOFF_DIR} is missing or empty. Cannot persist readout."
            exit 1
          fi
          mkdir -p "${DATE_DIR}"
          cp "${HANDOFF_DIR}/"* "${DATE_DIR}/"

          git add "${DATE_DIR}"
          if git diff --cached --quiet; then
            echo "No new readout files staged — readout for ${DATE} is already up to date."
            exit 0
          fi

          git commit -m "${PR_TITLE} [skip ci]"

          PR_BODY=$(printf '%s\n' \
            "Automated security alert readout persistence." \
            "" \
            "- Readout date: ${DATE}" \
            "- Run ID: \`${GITHUB_RUN_ID}\`" \
            "- Readout status: \`${READOUT_STATUS}\`" \
            "- Delta status: \`${DELTA_STATUS}\`" \
            "" \
            "Refs #2289." \
            "" \
            "> [!NOTE]" \
            "> Do not merge automatically. Human review required before merging.")

          if [[ -n "${EXISTING_PR}" ]]; then
            git push origin "${BRANCH_NAME}"
            echo "Updated existing readout PR #${EXISTING_PR} with new readout for ${DATE}."
          else
            git push origin "${BRANCH_NAME}"
            gh pr create \
              --head "${BRANCH_NAME}" \
              --base "main" \
              --title "${PR_TITLE}" \
              --body "${PR_BODY}"
          fi

  comment-epic:
    runs-on: ubuntu-latest
    needs: [security-readout, issue-automation]
    if: always()
    permissions:
      contents: read
      issues: write
    env:
      DATE_DIR:         ${{ needs.security-readout.outputs.date_dir }}
      READOUT_STATUS:   ${{ needs.security-readout.outputs.readout_status || 'unknown/failed' }}
      DELTA_STATUS:     ${{ needs.security-readout.outputs.delta_status || 'unknown/failed' }}
      AUTOMATION_MODE:  ${{ needs.issue-automation.outputs.automation_mode || 'skipped' }}
      AUTOMATION_EXIT:  ${{ needs.issue-automation.outputs.automation_exit || 'skipped' }}
    steps:
      - name: Post compact ledger comment to epic #2289
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          ISSUE_NUMBER="2289"

          RUN_ID="${GITHUB_RUN_ID}"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}"
          EVENT_NAME="${GITHUB_EVENT_NAME}"
          REF_NAME="${GITHUB_REF_NAME}"
          SHA_SHORT="${GITHUB_SHA:0:7}"

          # Prefer DATE derived from DATE_DIR when available (keeps it stable vs. clock skew).
          if [[ -n "${DATE_DIR:-}" ]]; then
            DATE="${DATE_DIR##*/}"
          else
            DATE="$(date -u +%Y-%m-%d)"
          fi

          marker="<!-- cdb-security-alert-readout-run:${RUN_ID} -->"

          # Dedupe: avoid posting multiple comments for the same workflow run id.
          existing_marker_count="$(gh api graphql \
            -f query='query($owner:String!,$name:String!,$number:Int!){repository(owner:$owner,name:$name){issue(number:$number){comments(last:50){nodes{body}}}}}' \
            -F owner="${OWNER}" \
            -F name="${REPO}" \
            -F number="${ISSUE_NUMBER}" \
            --jq '.data.repository.issue.comments.nodes[].body' \
            | grep -F "${marker}" -c || true)"

          if [[ "${existing_marker_count}" != "0" ]]; then
            echo "Epic issue already contains marker for run ${RUN_ID}; skipping comment."
            exit 0
          fi

          # Normalize statuses to explicit compact enums.
          readout_status="${READOUT_STATUS:-unknown/failed}"
          delta_status="${DELTA_STATUS:-unknown/failed}"

          readout_result="unknown/failed"
          if [[ "${readout_status}" == "ok" ]]; then
            readout_result="ok"
          elif [[ "${readout_status}" == "partial" ]]; then
            readout_result="partial"
          fi

          delta_result="unknown/failed"
          if [[ "${delta_status}" == "ok" ]]; then
            delta_result="ok"
          elif [[ "${delta_status}" == "first_run" ]]; then
            delta_result="first_run"
          elif [[ "${delta_status}" == "escalation_needed" ]]; then
            delta_result="escalation_needed"
          fi

          escalation_note=""
          if [[ "${delta_result}" == "escalation_needed" ]]; then
            escalation_note="manual triage required"
          fi

          # Derive automation boundary line from the issue-automation job outputs.
          automation_mode="${AUTOMATION_MODE:-skipped}"
          automation_exit="${AUTOMATION_EXIT:-skipped}"
          if [[ "${automation_mode}" == "live" ]]; then
            automation_note="issue-automation: LIVE (exit: ${automation_exit}) — check run log for created/skipped/failed counts"
          elif [[ "${automation_mode}" == "dry-run" ]]; then
            automation_note="issue-automation: dry-run (exit: ${automation_exit}) — no GitHub writes"
          else
            automation_note="issue-automation: skipped/not-run"
          fi

          comment_file="$(mktemp)"
          cat > "${comment_file}" <<EOF
          ${marker}
          ## Security Alert Readout — ${DATE}

          **Run**
          - Run-ID: \`${RUN_ID}\`
          - Run-URL: ${RUN_URL}
          - Trigger: \`${EVENT_NAME}\`
          - Ref: \`${REF_NAME}\`
          - SHA: \`${SHA_SHORT}\`

          **Status**
          - readout_status: \`${readout_status}\` (result: \`${readout_result}\`)
          - delta_status: \`${delta_status}\` (result: \`${delta_result}\`)${escalation_note:+ — ${escalation_note}}

          **Artifact hints**
          - \`docs/security/readouts/${DATE}/github_security_quality_readout.json\`
          - \`docs/security/readouts/${DATE}/github_security_quality_summary.md\`
          - \`artifacts/security-alert-readout/delta/security_alert_delta.json\`

          **Security boundaries**
          - ${automation_note}
          - no alert dismissals
          - no auto-merge
          - secret scanning remains redacted/status-only
          - no LR-/Live-/Echtgeld-Ableitung
          EOF

          gh issue comment "${ISSUE_NUMBER}" \
            --repo "${GITHUB_REPOSITORY}" \
            --body-file "${comment_file}"

  issue-automation:
    # Create GitHub issues for new high-severity alert groups detected in the
    # delta JSON.  Dry-run by default; pass issue_automation_live=true via
    # workflow_dispatch to enable live issue creation.
    #
    # Invariants:
    # - Scheduled runs: always dry-run (no issue spam).
    # - No auto-close, no alert dismissals, no LR derivation.
    # - Dedupe is fail-closed: a lookup failure skips creation (exit 2).
    # - Secret scanning candidates are excluded at the script layer.
    # - comparison_skipped sources are excluded at the script layer.
    runs-on: ubuntu-latest
    needs: security-readout
    if: always() && needs.security-readout.result != 'cancelled'
    permissions:
      contents: read
      actions: read
      issues: write
    outputs:
      automation_mode: ${{ steps.run-automation.outputs.automation_mode }}
      automation_exit: ${{ steps.run-automation.outputs.automation_exit }}

    env:
      DATE_DIR:       ${{ needs.security-readout.outputs.date_dir }}
      READOUT_STATUS: ${{ needs.security-readout.outputs.readout_status || 'unknown/failed' }}
      DELTA_STATUS:   ${{ needs.security-readout.outputs.delta_status || 'unknown/failed' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        shell: bash
        run: pip install --quiet -r requirements.txt

      - name: Download security-alert-readout artifact
        uses: actions/download-artifact@96a0b611a25419df80fce7e0ddf2b97cd4efdf6e # v4.1.8
        with:
          name: security-alert-readout-${{ github.run_number }}
          path: /tmp/security-readout-artifact

      - name: Run issue automation
        id: run-automation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          DELTA_JSON="/tmp/security-readout-artifact/artifacts/security-alert-readout/delta/security_alert_delta.json"

          if [[ ! -f "${DELTA_JSON}" ]]; then
            echo "Delta JSON not found at ${DELTA_JSON}; skipping issue automation."
            echo "This is expected when security-readout failed or produced no delta."
            echo "automation_mode=skipped" >> "${GITHUB_OUTPUT}"
            echo "automation_exit=skipped" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # Scheduled runs are always dry-run to prevent uncontrolled issue spam.
          # Live mode requires explicit workflow_dispatch with issue_automation_live=true.
          LIVE_MODE="false"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            LIVE_MODE="${{ inputs.issue_automation_live || 'false' }}"
          fi

          LIVE_FLAG=""
          AUTOMATION_MODE="dry-run"
          if [[ "${LIVE_MODE}" == "true" ]]; then
            LIVE_FLAG="--live-mode"
            AUTOMATION_MODE="live"
            echo "Issue automation: LIVE mode (will create real issues)"
          else
            echo "Issue automation: DRY-RUN mode (no GitHub writes)"
          fi

          set +e
          python3 scripts/audit/security_issue_automation.py \
            --delta-json "${DELTA_JSON}" \
            --repo "${GITHUB_REPOSITORY}" \
            ${LIVE_FLAG}
          SCRIPT_EXIT=$?
          set -e

          echo "automation_mode=${AUTOMATION_MODE}" >> "${GITHUB_OUTPUT}"
          echo "automation_exit=${SCRIPT_EXIT}" >> "${GITHUB_OUTPUT}"
          exit ${SCRIPT_EXIT}

