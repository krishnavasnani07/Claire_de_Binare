name: 🚫 Advanced Emoji Filter

on:
  push:
    branches: [ main ]
  schedule:
    # Täglich um 2 Uhr (UTC) scannen
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      auto_fix:
        description: 'Auto-fix gefundene Emojis?'
        required: false
        default: 'false'
        type: boolean
      scan_path:
        description: 'Pfad zum Scannen'
        required: false
        default: '.'
        type: string

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.11'

jobs:
  emoji-detection:
    name: 🔍 Emoji Detection
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    outputs:
      emojis-found: ${{ steps.scan.outputs.emojis-found }}
      blocked-count: ${{ steps.scan.outputs.blocked-count }}
      error-count: ${{ steps.scan.outputs.error-count }}
      block-pr: ${{ steps.scan.outputs.block-pr }}
      report-path: ${{ steps.scan.outputs.report-path }}
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0  # Für vollständige History
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: 📦 Install Dependencies
      run: |
        pip install --upgrade pip
        pip install regex emoji pyyaml
    
    - name: ⚙️ Validate Configuration
      run: |
        if [ ! -f .github/emoji-config.yaml ]; then
          echo "⚠️ Keine Konfiguration gefunden, verwende Standard-Config"
          mkdir -p .github
          cat > .github/emoji-config.yaml << 'EOF'
        detection:
          mode: "strict"
          file_extensions: [".py", ".js", ".ts", ".java", ".cpp", ".c"]
          exclude_dirs: [".git", "node_modules", "__pycache__"]
        whitelist:
          comments_allowed: ["✅", "❌", "⚠️"]
        actions:
          block_pr: true
        severity:
          code: "error"
          comment: "warning"
        EOF
        fi
        
        echo "📋 Konfiguration:"
        cat .github/emoji-config.yaml
    
    - name: 🔍 Run Emoji Scan
      id: scan
      run: |
        echo "🚀 Starte Emoji-Scan..."

        AUTO_FIX="${{ github.event.inputs.auto_fix || 'false' }}"
        SCAN_PATH="${{ github.event.inputs.scan_path || '.' }}"

        MODE="strict"
        if [ -f .github/emoji-config.yaml ]; then
          MODE=$(python -c "import yaml, pathlib; config = yaml.safe_load(pathlib.Path('.github/emoji-config.yaml').read_text()); print(config.get('detection', {}).get('mode', 'strict'))")
        fi

        ARGS="--config .github/emoji-config.yaml --path $SCAN_PATH --github-actions"

        if [ "$AUTO_FIX" = "true" ]; then
          ARGS="$ARGS --auto-fix"
          echo "🔧 Auto-Fix aktiviert"
        fi

        # Führe Scan aus
        set +e  # Erlaube Exit-Code != 0
        python .github/scripts/advanced-emoji-filter.py $ARGS
        EXIT_CODE=$?
        set -e

        # Lese Ergebnisse
        BLOCKED_COUNT=0
        ERROR_COUNT=0
        if [ -f emoji-report.json ]; then
          EMOJIS_FOUND=$(python -c "import json; data=json.load(open('emoji-report.json')); print(data['summary']['emojis_found'])")
          BLOCKED_COUNT=$(python -c "import json; data=json.load(open('emoji-report.json')); print(data['blocked_count'])")
          ERROR_COUNT=$(python -c "import json; data=json.load(open('emoji-report.json')); print(data.get('error_count', 0))")

          echo "emojis-found=$EMOJIS_FOUND" >> $GITHUB_OUTPUT
          echo "blocked-count=$BLOCKED_COUNT" >> $GITHUB_OUTPUT
          echo "error-count=$ERROR_COUNT" >> $GITHUB_OUTPUT
          echo "report-path=emoji-report.json" >> $GITHUB_OUTPUT

          echo "📊 Ergebnisse: $EMOJIS_FOUND Emojis gefunden, $BLOCKED_COUNT blockiert, $ERROR_COUNT mit Error-Severity"
        else
          echo "emojis-found=0" >> $GITHUB_OUTPUT
          echo "blocked-count=0" >> $GITHUB_OUTPUT
          echo "error-count=0" >> $GITHUB_OUTPUT
        fi

        BLOCK_PR="false"
        if [ "$ERROR_COUNT" -gt 0 ] && [ "$MODE" = "strict" ]; then
          BLOCK_PR="true"
        fi
        echo "block-pr=$BLOCK_PR" >> $GITHUB_OUTPUT

        exit $EXIT_CODE

    - name: 📊 Upload Report Artifacts
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: emoji-detection-report-${{ github.run_number }}
        path: |
          emoji-report.json
          emoji-report.md
          *.emoji-backup
        retention-days: 30
    
    - name: 💾 Commit Auto-Fixes
      if: github.event.inputs.auto_fix == 'true' && github.event_name == 'workflow_dispatch'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        if git diff --quiet; then
          echo "🔍 Keine Änderungen zu committen"
        else
          git add .
          git commit -m "🔧 Auto-fix: Emojis entfernt [skip ci]"
          git push
          echo "✅ Auto-fixes committed und gepusht"
        fi

  security-check:
    name: 🛡️ Security & Quality Check
    needs: emoji-detection
    runs-on: ubuntu-latest
    if: needs.emoji-detection.outputs.error-count > 0
    
    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    
    - name: 📥 Download Report
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: emoji-detection-report-${{ github.run_number }}
    
    - name: 🚨 Security Analysis
      run: |
        echo "🔍 Analysiere Sicherheitsimplikationen..."
        
        # Prüfe auf potentiell gefährliche Emojis in kritischen Bereichen
        CRITICAL_EMOJIS=$(python - <<'PY'
        import json
        try:
            with open('emoji-report.json') as f:
                data = json.load(f)

            critical = []
            for severity, detections in data.get('by_severity', {}).items():
                if severity == 'error':
                    for d in detections:
                        if d['context_type'] == 'code' and not d['is_whitelisted']:
                            critical.append(f"{d['file_path']}:{d['line_number']} - {d['emoji']}")

            print(len(critical))
            for item in critical:
                print(f'::error::{item}')
        except:
            print(0)
        PY
        )
        
        echo "🚨 Kritische Emojis gefunden: $CRITICAL_EMOJIS"
        
        if [ "$CRITICAL_EMOJIS" -gt 0 ]; then
          echo "::error::Kritische Emojis im Code gefunden! Security-Review erforderlich."
        fi

  notification:
    name: 📢 Notifications
    needs: [emoji-detection, security-check]
    runs-on: ubuntu-latest
    # Keep lenient scans advisory-only; open issues only when the scan is in blocking mode.
    if: always() && needs.emoji-detection.outputs.block-pr == 'true'
    permissions:
      issues: write
    
    steps:
    - name: 📥 Download Report
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: emoji-detection-report-${{ github.run_number }}
    
    - name: 📧 Create Issue
      if: github.event_name == 'push' || github.event_name == 'schedule'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          const handlePermissionError = (error) => {
            if (
              error &&
              error.status === 403 &&
              error.message &&
              error.message.includes('Resource not accessible by integration')
            ) {
              console.log(`Skipping action: ${error.message}`);
              return true;
            }
            return false;
          };

          const issueTitle = `emoji-filter alert - ${new Date().toISOString().split('T')[0]}`;
          const issueBody = [
            '**Scan Details:**',
            `- **Commit:** ${context.sha}`,
            `- **Branch:** ${context.ref}`,
            `- **Trigger:** ${context.eventName}`,
            `- **Emojis Found:** ${{ needs.emoji-detection.outputs.emojis-found }}`,
            `- **Blocked Count:** ${{ needs.emoji-detection.outputs.blocked-count }}`,
            `- **Error-Severity Count:** ${{ needs.emoji-detection.outputs.error-count }}`,
            '',
            `**Full Report:** [Download Artifact](${context.payload.repository.html_url}/actions/runs/${context.runId})`,
          ].join('\n');
          
          // Prüfe ob bereits Issue existiert
          const existingIssues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: ['emoji-detection', 'automated'],
            state: 'open'
          });
          
          if (existingIssues.data.length > 0) {
            // Update existing issue
            try {
              await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssues.data[0].number,
              body: `🔄 **Update:** Neuer Emoji-Detection Scan\n\n${issueBody}`
            });
            } catch (error) {
              if (!handlePermissionError(error)) {
                throw error;
              }
            }
          } else {
            // Create new issue
            try {
              await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['security', 'code-quality', 'emoji-detection', 'automated']
            });
            } catch (error) {
              if (!handlePermissionError(error)) {
                throw error;
              }
            }
          }
    
    - name: 📱 Slack Notification
      if: env.SLACK_WEBHOOK_URL != ''
      uses: 8398a7/action-slack@77eaa4f1c608a7d68b38af4e3f739dcd8cba273e # v3
      with:
        status: failure
        text: |
          🚫 **Emoji Detection Alert**
          
          **Repository:** ${{ github.repository }}
          **Branch:** ${{ github.ref_name }}
          **Emojis Found:** ${{ needs.emoji-detection.outputs.emojis-found }}
          **Blocked:** ${{ needs.emoji-detection.outputs.blocked-count }}
          
          [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  pr-comment:
    name: 💬 PR Comment
    needs: emoji-detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.emoji-detection.outputs.blocked-count > 0
    permissions:
      issues: write
    
    steps:
    - name: 📥 Download Report
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: emoji-detection-report-${{ github.run_number }}
    
    - name: 💬 Comment on PR
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          const fs = require('fs');
          
          let reportContent = '';
          const handlePermissionError = (error) => {
            if (
              error &&
              error.status === 403 &&
              error.message &&
              error.message.includes('Resource not accessible by integration')
            ) {
              console.log(`Skipping PR action: ${error.message}`);
              return true;
            }
            return false;
          };
          try {
            if (fs.existsSync('emoji-report.md')) {
              reportContent = fs.readFileSync('emoji-report.md', 'utf8');
            }
          } catch (error) {
            reportContent = '❌ Report konnte nicht geladen werden.';
          }
          
          const comment = `
          ## 🚫 Emoji Detection Results
          
          **Status:** ❌ Emojis gefunden die blockiert werden
          **Count:** ${{ needs.emoji-detection.outputs.blocked-count }} blockierte Emojis
          
          <details>
          <summary>📋 Detaillierter Report</summary>
          
          ${reportContent}
          
          </details>
          
          ### 🔧 Wie beheben?
          
          1. **Emojis entfernen:** Entferne die gefundenen Emojis manuell
          2. **Whitelist:** Füge Emojis zur Whitelist hinzu wenn berechtigt
          3. **Auto-Fix:** Nutze \`/emoji-fix\` Kommentar für automatische Behebung
          
          **Downloads:** [Report Artifacts](${context.payload.repository.html_url}/actions/runs/${context.runId})
          `;
          
          // Poste Kommentar
          try {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
          } catch (error) {
            if (!handlePermissionError(error)) {
              throw error;
            }
          }
          
          // Füge Label hinzu
          try {
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['emoji-detected', 'needs-review']
            });
          } catch (error) {
            if (!handlePermissionError(error)) {
              throw error;
            }
          }

  block-merge:
    name: 🚫 Block PR Merge  
    needs: emoji-detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.emoji-detection.outputs.block-pr == 'true'

    steps:
    - name: 🚫 Fail Check
      run: |
        echo "::error::PR merge blocked due to error-severity emoji detection"
        echo "🚫 Error-severity emojis found: ${{ needs.emoji-detection.outputs.error-count }}"
        echo "📋 Please review the emoji detection report and fix issues before merging."
        exit 1
