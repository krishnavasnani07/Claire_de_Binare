name: python-compat

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  # NOISE-FREEZE (#2613): push auto-trigger disabled due to billing/account-locked
  # non-required check noise. Scheduled and manual runs remain available.

permissions:
  contents: read

jobs:
  compat:
    name: Python compatibility matrix (informational)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    continue-on-error: ${{ contains(fromJson('["3.13","3.14"]'), matrix.python-version) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Quick compatibility smoke
        run: python -c "import sys; print(sys.version)"
