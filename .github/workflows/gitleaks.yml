# Gitleaks Secret Scanning
# Issue #313: Configure gitleaks secret-scanning in CI
#
# Scans for secrets in:
# - All commits in PRs
# - Push to main/develop
# - Weekly full repo scan

name: Gitleaks Secret Scan

on:
  # NOISE-FREEZE (#2613): push auto-trigger disabled due to billing/account-locked
  # non-required check noise. Scheduled and manual runs remain available.
  schedule:
    - cron: '0 3 * * 0'  # Weekly Sunday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks (Secrets-Alarm)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # Full history for PR scanning

      - name: Prepare results.sarif placeholder
        run: |
          # Ensure the expected SARIF file exists before gitleaks runs
          : > results.sarif

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: true  # Comment on PRs with findings

      - name: Check SARIF artifact
        id: sarif
        run: |
          if [ -f results.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::results.sarif missing; skipping SARIF upload"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF
        if: steps.sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          sarif_file: results.sarif
        continue-on-error: true  # Don't fail if no SARIF generated

  # Full repo scan (scheduled only)
  full-scan:
    name: Full Repository Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.21.2_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Full Scan
        run: |
          gitleaks detect \
            --config=gitleaks.toml \
            --source=. \
            --report-format=sarif \
            --report-path=gitleaks-full.sarif \
            --verbose

      - name: Upload Full Scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          sarif_file: gitleaks-full.sarif
        continue-on-error: true

      - name: Summary
        if: always()
        run: |
          echo "## Gitleaks Full Repository Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Scan Type: Full repository history" >> $GITHUB_STEP_SUMMARY
          echo "- Config: gitleaks.toml" >> $GITHUB_STEP_SUMMARY
          echo "- Ignorelist: .gitleaksignore" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f gitleaks-full.sarif ]; then
            echo "SARIF report uploaded to GitHub Security tab." >> $GITHUB_STEP_SUMMARY
          fi
