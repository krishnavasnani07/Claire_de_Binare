name: 🏷️ Sync Repository Labels

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/labels.json'
  workflow_dispatch:

jobs:
  sync-labels:
    name: Sync Labels from labels.json
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🧩 Prepare sync manifest
        run: jq '.labels' .github/workflows/labels.json > .github/workflows/labels.sync.json

      - name: 🏷️ Sync Labels
        uses: micnncim/action-label-syncer@3abd5ab72fda571e69fffd97bd4e0033dd5f495c # v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          manifest: .github/workflows/labels.sync.json
          prune: false
