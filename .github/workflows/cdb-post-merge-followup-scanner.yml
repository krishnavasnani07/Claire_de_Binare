name: CDB Post-Merge Follow-up Scanner

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Merged PR number to scan"
        required: true
        type: string
      publish_mode:
        description: "Whether to publish to #1445 / create follow-up issues"
        required: true
        default: dry_run
        type: choice
        options:
          - dry_run
          - publish

permissions:
  contents: read
  issues: write
  models: read
  pull-requests: read

jobs:
  scan:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install gh-models extension
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh extension install github/gh-models --force

      - name: Resolve scan inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            pr_number="${{ inputs.pr_number }}"
            publish_mode="${{ inputs.publish_mode }}"
          else
            pr_number="${{ github.event.pull_request.number }}"
            publish_mode="publish"
          fi

          if ! [[ "$pr_number" =~ ^[0-9]+$ ]]; then
            echo "::error::pr_number must be numeric."
            exit 1
          fi

          {
            echo "pr_number=$pr_number"
            echo "publish_mode=$publish_mode"
          } >> "$GITHUB_OUTPUT"

      - name: Run post-merge follow-up scan
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          result_json="artifacts/cdb-post-merge-followup/result.json"
          summary_md="artifacts/cdb-post-merge-followup/summary.md"

          python3 .github/scripts/post_merge_followup_scanner.py \
            --repo "${GITHUB_REPOSITORY}" \
            --pr-number "${{ steps.resolve.outputs.pr_number }}" \
            --prompt-file ".github/prompts/cdb-control-followup.prompt.yml" \
            --result-file "$result_json" \
            --summary-file "$summary_md" \
            --publish-mode "${{ steps.resolve.outputs.publish_mode }}"

          cat "$summary_md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scanner artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cdb-post-merge-followup-scan
          path: artifacts/cdb-post-merge-followup/
          if-no-files-found: warn
