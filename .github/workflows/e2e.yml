# Secondary CI smoke workflow.
# 431B canonical Docker CI lab baseline lives at infrastructure/compose/base.yml + infrastructure/compose/test.yml.
name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'tests/e2e/**'
      - 'services/**'
      - 'infrastructure/compose/**'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e_smoke:
    name: E2E Smoke Test (market_data → signal)
    runs-on: ubuntu-latest
    env:
      SECRETS_PATH: ${{ github.workspace }}/.ci-secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Preflight required secrets (REAL vs STUB)
        id: preflight
        shell: bash
        env:
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          MEXC_API_KEY: ${{ secrets.MEXC_API_KEY }}
          MEXC_API_SECRET: ${{ secrets.MEXC_API_SECRET }}
        run: |
          set -euo pipefail
          required=(SMTP_FROM SMTP_HOST SMTP_USER SMTP_PASSWORD ALERT_EMAIL_TO MEXC_API_KEY MEXC_API_SECRET)
          missing=()

          for secret_name in "${required[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              missing+=("$secret_name")
            fi
          done

          e2e_mode="REAL"
          if [[ ${#missing[@]} -gt 0 ]]; then
            e2e_mode="STUB"
          fi

          missing_csv="none"
          if [[ ${#missing[@]} -gt 0 ]]; then
            missing_csv="$(IFS=,; echo "${missing[*]}")"
          fi

          protected_context="false"
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            protected_context="true"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" && ( "${GITHUB_EVENT_NAME}" == "push" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ) ]]; then
            protected_context="true"
          fi

          echo "e2e_mode=${e2e_mode}" >> "$GITHUB_OUTPUT"
          echo "missing_secrets=${missing_csv}" >> "$GITHUB_OUTPUT"
          echo "protected_context=${protected_context}" >> "$GITHUB_OUTPUT"

          {
            echo "## E2E Preflight"
            echo ""
            echo "- e2e_mode: ${e2e_mode}"
            echo "- protected_context: ${protected_context}"
            echo "- missing_secrets: ${missing_csv}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail closed on protected STUB mode
        if: steps.preflight.outputs.protected_context == 'true' && steps.preflight.outputs.e2e_mode == 'STUB'
        shell: bash
        run: |
          echo "::error::Protected run cannot use STUB MODE. Missing secrets: ${{ steps.preflight.outputs.missing_secrets }}"
          exit 1

      - name: Create CI secrets directory
        env:
          SMTP_FROM_SECRET: ${{ secrets.SMTP_FROM }}
          SMTP_HOST_SECRET: ${{ secrets.SMTP_HOST }}
          SMTP_USER_SECRET: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD_SECRET: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_TO_SECRET: ${{ secrets.ALERT_EMAIL_TO }}
          MEXC_API_KEY_SECRET: ${{ secrets.MEXC_API_KEY }}
          MEXC_API_SECRET_SECRET: ${{ secrets.MEXC_API_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p "$SECRETS_PATH"
          REDIS_VAL="${{ secrets.REDIS_PASSWORD != '' && secrets.REDIS_PASSWORD || 'ci-redis-password' }}"
          POSTGRES_VAL="${{ secrets.POSTGRES_PASSWORD != '' && secrets.POSTGRES_PASSWORD || 'ci-postgres-password' }}"
          GRAFANA_VAL="${{ secrets.GRAFANA_PASSWORD != '' && secrets.GRAFANA_PASSWORD || 'ci-grafana-password' }}"
          SMTP_FROM_VAL="${SMTP_FROM_SECRET:-}"
          SMTP_HOST_VAL="${SMTP_HOST_SECRET:-}"
          SMTP_USER_VAL="${SMTP_USER_SECRET:-}"
          SMTP_PASSWORD_VAL="${SMTP_PASSWORD_SECRET:-}"
          ALERT_EMAIL_TO_VAL="${ALERT_EMAIL_TO_SECRET:-}"
          MEXC_KEY_VAL="${MEXC_API_KEY_SECRET:-}"
          MEXC_SECRET_VAL="${MEXC_API_SECRET_SECRET:-}"

          if [[ "${{ steps.preflight.outputs.e2e_mode }}" == "STUB" ]]; then
            SMTP_FROM_VAL="ci-stub@example.invalid"
            SMTP_HOST_VAL="stub"
            SMTP_USER_VAL="stub"
            SMTP_PASSWORD_VAL="stub"
            ALERT_EMAIL_TO_VAL="ci-stub@example.invalid"
            MEXC_KEY_VAL="ci-mexc-key"
            MEXC_SECRET_VAL="ci-mexc-secret"
          fi

          echo "$REDIS_VAL" > "$SECRETS_PATH/REDIS_PASSWORD"
          echo "$POSTGRES_VAL" > "$SECRETS_PATH/POSTGRES_PASSWORD"
          echo "postgresql://claire_user:${POSTGRES_VAL}@postgres:5432/claire?sslmode=disable" > "$SECRETS_PATH/POSTGRES_PASSWORD_DSN"
          echo "$GRAFANA_VAL" > "$SECRETS_PATH/GRAFANA_PASSWORD"
          echo "$SMTP_FROM_VAL" > "$SECRETS_PATH/SMTP_FROM"
          echo "$SMTP_HOST_VAL" > "$SECRETS_PATH/SMTP_HOST"
          echo "$SMTP_USER_VAL" > "$SECRETS_PATH/SMTP_USER"
          echo "$SMTP_PASSWORD_VAL" > "$SECRETS_PATH/SMTP_PASSWORD"
          echo "$ALERT_EMAIL_TO_VAL" > "$SECRETS_PATH/ALERT_EMAIL_TO"
          echo "$MEXC_KEY_VAL" > "$SECRETS_PATH/MEXC_API_KEY.txt"
          echo "$MEXC_SECRET_VAL" > "$SECRETS_PATH/MEXC_API_SECRET.txt"
          # Compose mounts these files into /run/secrets/*; keep read access for non-root service users.
          chmod 755 "$SECRETS_PATH"
          chmod 644 "$SECRETS_PATH"/*

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov requests redis psycopg2-binary
          pip install -r requirements-mcp.txt

      - name: MCP Validation
        run: make mcp-config-validate MCP_CONFIG_PATHS="tests/fixtures/mcp_smoke_config.json"

      - name: Create .env file
        run: |
          ws_source="stub"
          if [[ "${{ steps.preflight.outputs.e2e_mode }}" == "REAL" ]]; then
            ws_source="mexc_pb"
          fi
          # Issue #748: derive policy version from tag or short SHA
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            policy_version="${{ github.ref_name }}"
          else
            policy_version="dev-$(echo '${{ github.sha }}' | cut -c1-7)"
          fi
          cat > .env << EOF
          # E2E Test Environment
          WS_SOURCE=${ws_source}
          REDIS_HOST=localhost
          REDIS_PORT=6379
          REDIS_PASSWORD=
          LOG_LEVEL=INFO
          CDB_GIT_COMMIT=${{ github.sha }}
          CDB_POLICY_VERSION=${policy_version}
          EOF

      - name: Start Docker Compose stack (secondary CI smoke path)
        id: start_stack
        shell: bash
        run: |
          set -euo pipefail
          # Export runtime env from CI secret files so services do not depend on file readability inside containers.
          export REDIS_PASSWORD="$(cat "$SECRETS_PATH/REDIS_PASSWORD")"
          export POSTGRES_PASSWORD="$(cat "$SECRETS_PATH/POSTGRES_PASSWORD")"
          export POSTGRES_PASSWORD_DSN="$(cat "$SECRETS_PATH/POSTGRES_PASSWORD_DSN")"
          export GRAFANA_PASSWORD="$(cat "$SECRETS_PATH/GRAFANA_PASSWORD")"
          export SMTP_FROM="$(cat "$SECRETS_PATH/SMTP_FROM")"
          export SMTP_HOST="$(cat "$SECRETS_PATH/SMTP_HOST")"
          export SMTP_USER="$(cat "$SECRETS_PATH/SMTP_USER")"
          export SMTP_PASSWORD="$(cat "$SECRETS_PATH/SMTP_PASSWORD")"
          export ALERT_EMAIL_TO="$(cat "$SECRETS_PATH/ALERT_EMAIL_TO")"
          export MEXC_API_KEY="$(cat "$SECRETS_PATH/MEXC_API_KEY.txt")"
          export MEXC_API_SECRET="$(cat "$SECRETS_PATH/MEXC_API_SECRET.txt")"

          docker compose -f infrastructure/compose/base.yml \
                         -f infrastructure/compose/dev.yml \
                         -f infrastructure/compose/logging.yml \
                         up -d

      - name: Wait for services to be healthy
        id: health_wait
        shell: bash
        run: |
          set -euo pipefail
          echo "⏳ Waiting for services to be healthy..."
          timeout=240
          sleep_interval=5
          elapsed=0
          required_services=(cdb_redis cdb_prometheus cdb_signal)
          last_status="none"
          echo "failure_reason=none" >> "$GITHUB_OUTPUT"

          while [ $elapsed -lt $timeout ]; do
            all_healthy=true
            status_parts=()

            for service in "${required_services[@]}"; do
              state=$(docker inspect --format='{{.State.Status}}' "$service" 2>/dev/null || echo "missing")
              health=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$service" 2>/dev/null || echo "missing")
              status_parts+=("${service}:${state}/${health}")
              if [ "$health" != "healthy" ]; then
                all_healthy=false
              fi
            done

            last_status="$(IFS=,; echo "${status_parts[*]}")"
            echo "  ⏳ status=${last_status}"

            if [ "$all_healthy" = true ]; then
              echo "✅ All required services healthy"
              exit 0
            fi

            sleep "$sleep_interval"
            elapsed=$((elapsed + sleep_interval))
          done

          echo "failure_reason=timeout_waiting_for_health:${last_status}" >> "$GITHUB_OUTPUT"
          echo "❌ Timeout waiting for required services to become healthy"
          exit 1

      - name: Run E2E Smoke Tests
        id: run_smoke
        run: |
          pytest tests/e2e/test_smoke_pipeline.py -v --tb=short --no-cov

      - name: Show service logs on failure
        id: show_failure_logs
        if: failure()
        shell: bash
        run: |
          set +e
          echo "=== cdb_signal logs ==="
          docker logs cdb_signal --tail 100 || true

          echo "=== cdb_ws logs ==="
          docker logs cdb_ws --tail 100 || true

          echo "=== cdb_redis logs ==="
          docker logs cdb_redis --tail 50 || true

          echo "=== Docker ps ==="
          docker ps --filter name=cdb_ || true

      - name: Collect diagnostics on failure
        id: collect_diagnostics
        if: failure()
        shell: bash
        run: |
          set +e
          mkdir -p e2e-diagnostics/endpoints

          docker compose -f infrastructure/compose/base.yml -f infrastructure/compose/dev.yml -f infrastructure/compose/logging.yml ps --all > e2e-diagnostics/compose_ps.txt 2>&1
          docker compose -f infrastructure/compose/base.yml -f infrastructure/compose/dev.yml -f infrastructure/compose/logging.yml logs --no-color --tail=400 > e2e-diagnostics/compose_logs_tail_400.txt 2>&1
          docker ps --filter name=cdb_ > e2e-diagnostics/docker_ps_cdb.txt 2>&1
          docker inspect cdb_redis cdb_prometheus cdb_signal cdb_ws > e2e-diagnostics/docker_inspect_core.json 2>&1

          for service in cdb_signal cdb_ws cdb_redis cdb_prometheus cdb_postgres; do
            docker logs "$service" --tail 200 > "e2e-diagnostics/${service}_logs_tail_200.txt" 2>&1
          done

          for endpoint in \
            "ws_health|http://127.0.0.1:8000/health" \
            "signal_health|http://127.0.0.1:8005/health" \
            "prometheus_healthy|http://127.0.0.1:19090/-/healthy"; do
            name="${endpoint%%|*}"
            url="${endpoint#*|}"
            curl --connect-timeout 3 --max-time 10 -fsS "$url" > "e2e-diagnostics/endpoints/${name}.txt" 2>&1
          done

          ss -lntp > e2e-diagnostics/listening_ports.txt 2>&1

      - name: Upload diagnostics artifact
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-smoke-diagnostics-${{ github.run_id }}
          path: e2e-diagnostics/
          retention-days: 7
          if-no-files-found: warn

      - name: E2E failure summary
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          failing_step="unknown"
          top_level_error="see diagnostics artifact"

          if [[ "${{ steps.start_stack.outcome }}" == "failure" ]]; then
            failing_step="Start Docker Compose stack"
            top_level_error="docker compose up failed"
          elif [[ "${{ steps.health_wait.outcome }}" == "failure" ]]; then
            failing_step="Wait for services to be healthy"
            top_level_error="${{ steps.health_wait.outputs.failure_reason }}"
          elif [[ "${{ steps.run_smoke.outcome }}" == "failure" ]]; then
            failing_step="Run E2E Smoke Tests"
            top_level_error="pytest smoke pipeline failed"
          fi

          {
            echo "## ❌ E2E Smoke Test Failed"
            echo ""
            echo "- e2e_mode: ${{ steps.preflight.outputs.e2e_mode }}"
            echo "- failing_step: ${failing_step}"
            echo "- top_level_error: ${top_level_error}"
            echo "- diagnostics_artifact: e2e-smoke-diagnostics-${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Teardown Docker Compose stack
        if: always()
        run: |
          docker compose -f infrastructure/compose/base.yml \
                         -f infrastructure/compose/dev.yml \
                         -f infrastructure/compose/logging.yml \
                         down -v

      - name: E2E test summary
        if: success()
        run: |
          echo "## ✅ E2E Smoke Test Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- e2e_mode: ${{ steps.preflight.outputs.e2e_mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- market_data fixture published (10 deterministic messages)" >> $GITHUB_STEP_SUMMARY
          echo "- cdb_signal generated signals" >> $GITHUB_STEP_SUMMARY
          echo "- Prometheus metrics validated (signals_generated_total > 0)" >> $GITHUB_STEP_SUMMARY
