name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'tests/e2e/**'
      - 'services/**'
      - 'infrastructure/compose/**'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:
    inputs:
      allow_stub:
        description: 'Allow STUB mode (non-protected branches only)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e_smoke:
    name: E2E Smoke Test (market_data → signal)
    runs-on: ubuntu-latest
    env:
      SECRETS_PATH: ${{ github.workspace }}/.ci-secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create CI secrets directory
        run: |
          mkdir -p $SECRETS_PATH
          # Use real secrets if available, otherwise dummy (governance will block if protected)
          REDIS_VAL="${{ secrets.REDIS_PASSWORD != '' && secrets.REDIS_PASSWORD || 'ci-redis-password' }}"
          POSTGRES_VAL="${{ secrets.POSTGRES_PASSWORD != '' && secrets.POSTGRES_PASSWORD || 'ci-postgres-password' }}"
          GRAFANA_VAL="${{ secrets.GRAFANA_PASSWORD != '' && secrets.GRAFANA_PASSWORD || 'ci-grafana-password' }}"
          MEXC_KEY_VAL="${{ secrets.MEXC_API_KEY != '' && secrets.MEXC_API_KEY || 'ci-mexc-key' }}"
          MEXC_SECRET_VAL="${{ secrets.MEXC_API_SECRET != '' && secrets.MEXC_API_SECRET || 'ci-mexc-secret' }}"

          echo "$REDIS_VAL" > "$SECRETS_PATH/REDIS_PASSWORD"
          echo "$POSTGRES_VAL" > "$SECRETS_PATH/POSTGRES_PASSWORD"
          echo "postgresql://claire_user:${POSTGRES_VAL}@postgres:5432/claire?sslmode=disable" > "$SECRETS_PATH/POSTGRES_PASSWORD_DSN"
          echo "$GRAFANA_VAL" > "$SECRETS_PATH/GRAFANA_PASSWORD"
          echo "$MEXC_KEY_VAL" > "$SECRETS_PATH/MEXC_API_KEY.txt"
          echo "$MEXC_SECRET_VAL" > "$SECRETS_PATH/MEXC_API_SECRET.txt"

      - name: Decide E2E mode (REAL vs STUB)
        id: e2e_mode
        shell: bash
        env:
          MEXC_API_KEY: ${{ secrets.MEXC_API_KEY }}
          MEXC_API_SECRET: ${{ secrets.MEXC_API_SECRET }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          req=(MEXC_API_KEY MEXC_API_SECRET REDIS_PASSWORD POSTGRES_PASSWORD GRAFANA_PASSWORD)
          for k in "${req[@]}"; do
            if [[ -z "${!k:-}" ]]; then missing=1; fi
          done

          mode="REAL"
          if [[ "${missing}" == "1" ]]; then
            mode="STUB"
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      - name: ❌ Missing secrets or forbidden STUB (HARD FAIL)
        if: |
          steps.e2e_mode.outputs.mode == 'STUB' && (
            github.ref == 'refs/heads/main' ||
            startsWith(github.ref, 'refs/heads/release/') ||
            startsWith(github.ref, 'refs/heads/soak/') ||
            startsWith(github.ref, 'refs/heads/shadow/') ||
            github.event_name == 'schedule' ||
            (github.event.inputs.allow_stub != 'true' && !contains(github.event.pull_request.labels.*.name, 'allow-stub'))
          )
        shell: bash
        run: |
          echo "::error title=CDB E2E BLOCKER::Secrets missing or STUB mode forbidden in this context (e2e.yml)."
          exit 1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov requests redis psycopg2-binary
          pip install -r requirements-mcp.txt

      - name: MCP Validation
        run: make mcp-config-validate MCP_CONFIG_PATHS="tests/fixtures/mcp_smoke_config.json"

      - name: Create .env file
        run: |
          cat > .env << EOF
          # E2E Test Environment
          WS_SOURCE=${{ steps.e2e_mode.outputs.mode == 'REAL' && 'live' || 'stub' }}
          REDIS_HOST=localhost
          REDIS_PORT=6379
          REDIS_PASSWORD=
          LOG_LEVEL=INFO
          EOF

      - name: Start Docker Compose stack
        run: |
          docker compose -f infrastructure/compose/base.yml \
                         -f infrastructure/compose/dev.yml \
                         -f infrastructure/compose/logging.yml \
                         up -d

      - name: Wait for services to be healthy
        run: |
          echo "⏳ Waiting for services to be healthy..."
          timeout=180  # give composed services time for initial health checks
          elapsed=0

          while [ $elapsed -lt $timeout ]; do
            all_healthy=true

            for service in cdb_redis cdb_prometheus cdb_signal; do
              health=$(docker inspect --format='{{.State.Health.Status}}' $service 2>/dev/null || echo "not_found")

              if [ "$health" != "healthy" ]; then
                echo "  ⏳ $service not healthy yet (status: $health)"
                all_healthy=false
                break
              fi
            done

            if [ "$all_healthy" = true ]; then
              echo "✅ All services healthy"
              break
            fi

            sleep 2
            elapsed=$((elapsed + 2))
          done

          if [ $elapsed -ge $timeout ]; then
            echo "❌ Timeout waiting for services to be healthy"
            docker ps --filter name=cdb_
            docker logs cdb_signal --tail 50
            exit 1
          fi

      - name: Run E2E Smoke Tests
        run: |
          pytest tests/e2e/test_smoke_pipeline.py -v --tb=short --no-cov

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "=== cdb_signal logs ==="
          docker logs cdb_signal --tail 100

          echo "=== cdb_ws logs ==="
          docker logs cdb_ws --tail 100

          echo "=== cdb_redis logs ==="
          docker logs cdb_redis --tail 50

          echo "=== Docker ps ==="
          docker ps --filter name=cdb_

      - name: Teardown Docker Compose stack
        if: always()
        run: |
          docker compose -f infrastructure/compose/base.yml \
                         -f infrastructure/compose/dev.yml \
                         -f infrastructure/compose/logging.yml \
                         down -v

      - name: E2E test summary
        if: success()
        run: |
          echo "## ✅ E2E Smoke Test Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- market_data fixture published (10 deterministic messages)" >> $GITHUB_STEP_SUMMARY
          echo "- cdb_signal generated signals" >> $GITHUB_STEP_SUMMARY
          echo "- Prometheus metrics validated (signals_generated_total > 0)" >> $GITHUB_STEP_SUMMARY
