name: Sync Stage Labels From Milestone
on:
  issues:
    types: [milestoned, demilestoned, reopened]

jobs:
  sync-stage-labels:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve CDB auth token (APP preferred, PAT fallback)
        id: resolve-auth
        shell: bash
        env:
          LEGACY_PAT: ${{ secrets.ADD_TO_PROJECT_PAT }}
          CDB_GH_APP_ID: ${{ secrets.CDB_GH_APP_ID }}
          CDB_GH_APP_INSTALLATION_ID: ${{ secrets.CDB_GH_APP_INSTALLATION_ID }}
          CDB_GH_APP_PRIVATE_KEY: ${{ secrets.CDB_GH_APP_PRIVATE_KEY }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -euo pipefail

          b64url() {
            openssl base64 -A | tr '+/' '-_' | tr -d '='
          }

          has_app_id="false"
          has_app_key="false"
          [[ -n "${CDB_GH_APP_ID:-}" ]] && has_app_id="true"
          [[ -n "${CDB_GH_APP_PRIVATE_KEY:-}" ]] && has_app_key="true"

          if [[ "$has_app_id" != "$has_app_key" ]]; then
            echo "Incomplete GitHub App auth config. Set both CDB_GH_APP_ID and CDB_GH_APP_PRIVATE_KEY, or unset both to use ADD_TO_PROJECT_PAT." >&2
            exit 1
          fi

          if [[ "$has_app_id" == "true" ]]; then
            now="$(date +%s)"
            iat="$((now - 60))"
            exp="$((now + 540))"

            header='{"alg":"RS256","typ":"JWT"}'
            payload="$(jq -nc --arg iss "$CDB_GH_APP_ID" --argjson iat "$iat" --argjson exp "$exp" '{iss:$iss,iat:$iat,exp:$exp}')"
            signing_input="$(printf '%s' "$header" | b64url).$(printf '%s' "$payload" | b64url)"

            key_file="$(mktemp)"
            trap 'rm -f "$key_file"' EXIT
            printf '%s' "$CDB_GH_APP_PRIVATE_KEY" > "$key_file"

            signature="$(printf '%s' "$signing_input" | openssl dgst -sha256 -sign "$key_file" -binary | b64url)"
            app_jwt="${signing_input}.${signature}"

            installation_id="${CDB_GH_APP_INSTALLATION_ID:-}"
            if [[ -z "$installation_id" ]]; then
              install_json="$(curl -fsSL \
                -H "Authorization: Bearer ${app_jwt}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${REPO_FULL}/installation")"
              installation_id="$(jq -r '.id // empty' <<<"$install_json")"
            fi

            if [[ -z "$installation_id" ]]; then
              echo "GitHub App mode selected but installation id could not be resolved. Set CDB_GH_APP_INSTALLATION_ID." >&2
              exit 1
            fi

            token_json="$(curl -fsSL -X POST \
              -H "Authorization: Bearer ${app_jwt}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/app/installations/${installation_id}/access_tokens")"
            app_token="$(jq -r '.token // empty' <<<"$token_json")"

            if [[ -z "$app_token" ]]; then
              echo "GitHub App mode selected but access token minting failed." >&2
              exit 1
            fi

            echo "::add-mask::${app_token}"
            echo "cdb_auth_token=${app_token}" >> "$GITHUB_OUTPUT"
            echo "auth_mode=APP" >> "$GITHUB_OUTPUT"
            echo "Auth mode selected: APP"
          elif [[ -n "${LEGACY_PAT:-}" ]]; then
            echo "::add-mask::${LEGACY_PAT}"
            echo "cdb_auth_token=${LEGACY_PAT}" >> "$GITHUB_OUTPUT"
            echo "auth_mode=PAT" >> "$GITHUB_OUTPUT"
            echo "Auth mode selected: PAT"
          else
            echo "No auth token configured. Set CDB_GH_APP_ID + CDB_GH_APP_PRIVATE_KEY (+ optional CDB_GH_APP_INSTALLATION_ID) or ADD_TO_PROJECT_PAT." >&2
            exit 1
          fi

      - name: Sync mutually-exclusive stage labels
        shell: bash
        env:
          CDB_AUTH_TOKEN: ${{ steps.resolve-auth.outputs.cdb_auth_token }}
          GH_TOKEN: ${{ steps.resolve-auth.outputs.cdb_auth_token }}
        run: |
          set -euo pipefail

          event_name="${GITHUB_EVENT_NAME}"
          event_path="${GITHUB_EVENT_PATH}"
          repo="${GITHUB_REPOSITORY}"
          action="$(jq -r '.action // empty' "$event_path")"

          stage_labels_json='[
            "stage:proof",
            "stage:stability",
            "stage:trade-capable",
            "stage:strategy-validated",
            "stage:monetization",
            "stage:scale"
          ]'

          case "$event_name" in
            issues)
              number="$(jq -r '.issue.number // empty' "$event_path")"
              item_url="$(jq -r '.issue.html_url // empty' "$event_path")"
              milestone_title="$(jq -r '.issue.milestone.title // empty' "$event_path")"
              labels_json="$(jq -c '[.issue.labels[]?.name] | map(select(type == "string" and length > 0))' "$event_path")"
              ;;
            pull_request)
              number="$(jq -r '.pull_request.number // empty' "$event_path")"
              item_url="$(jq -r '.pull_request.html_url // empty' "$event_path")"
              milestone_title="$(jq -r '.pull_request.milestone.title // empty' "$event_path")"
              labels_json="$(jq -c '[.pull_request.labels[]?.name] | map(select(type == "string" and length > 0))' "$event_path")"
              ;;
            *)
              echo "Unsupported event: $event_name"
              exit 0
              ;;
          esac

          if [[ -z "$number" ]]; then
            echo "No item number in event payload; skipping."
            exit 0
          fi

          desired_stage=""
          if [[ "$action" != "demilestoned" ]]; then
            case "$milestone_title" in
              "System ist beweisbar") desired_stage="stage:proof" ;;
              "System ist stabil") desired_stage="stage:stability" ;;
              "System kann handeln") desired_stage="stage:trade-capable" ;;
              "Strategie ist validiert") desired_stage="stage:strategy-validated" ;;
              "System verdient Geld") desired_stage="stage:monetization" ;;
              "Skaliert") desired_stage="stage:scale" ;;
              *) desired_stage="" ;;
            esac
          fi

          non_stage_labels_json="$(jq -cn \
            --argjson labels "$labels_json" \
            --argjson stage "$stage_labels_json" \
            '[ $labels[] | . as $l | select((any($stage[]; . == $l)) | not) ]'
          )"

          final_labels_json="$(jq -cn \
            --argjson non_stage "$non_stage_labels_json" \
            --arg desired "$desired_stage" \
            '($non_stage + (if $desired == "" then [] else [$desired] end)) | unique'
          )"

          current_canon="$(jq -c 'sort | unique' <<<"$labels_json")"
          final_canon="$(jq -c 'sort | unique' <<<"$final_labels_json")"

          if [[ "$current_canon" == "$final_canon" ]]; then
            echo "No label changes needed for $item_url (action=$action, milestone='${milestone_title:-<none>}')."
            exit 0
          fi

          payload="$(jq -cn --argjson labels "$final_labels_json" '{labels: $labels}')"
          printf '%s' "$payload" | gh api --method PUT "repos/$repo/issues/$number/labels" --input - > /dev/null

          if [[ -n "$desired_stage" ]]; then
            echo "Synced labels for $item_url -> $desired_stage"
          else
            echo "Synced labels for $item_url -> no stage label"
          fi
