name: trivy

on:
  push:
    branches: ["main", "release/*"]
    paths:
      - "Dockerfile"
      - "infrastructure/**"
      - "services/**"
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read

env:
  # CVE-2025-12818 allowlist is computed dynamically and drops once Debian
  # bookworm/trixie expose a fixed version.
  TRIVY_SUMMARY_MAX: "5"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-image:
    name: trivy (kritische CVEs/Supply-Chain)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Trivy DB Cache (macht Runs schneller/stabiler)
      - name: Cache Trivy DB
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}-${{ github.workflow }}-${{ github.sha }}
          restore-keys: |
            trivy-${{ runner.os }}-${{ github.workflow }}-
            trivy-${{ runner.os }}-

      - name: Debug Docker version
        run: docker version

      - name: Debug Docker info
        run: docker info

      - name: Debug Trivy action version
        run: echo "Using aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143"

      - name: Compute Trivy allowlist (Debian tracker)
        run: |
          set -euo pipefail
          cve="CVE-2025-12818"
          osv_url="https://api.osv.dev/v1/vulns/DEBIAN-${cve}"
          tracker_url="https://security-tracker.debian.org/tracker/${cve}"
          allowlist="$cve"
          source="OSV"
          decision="lookup failed; fail-safe allowlist retained."

          if osv_json="$(curl -fsSL "$osv_url" 2>/dev/null)"; then
            fixed_bookworm="$(jq -r '[.affected[]? | select((.package.ecosystem // "") == "Debian:12") | .ranges[]?.events[]?.fixed // empty] | map(select(length > 0)) | first // ""' <<<"$osv_json")"
            fixed_trixie="$(jq -r '[.affected[]? | select((.package.ecosystem // "") == "Debian:13") | .ranges[]?.events[]?.fixed // empty] | map(select(length > 0)) | first // ""' <<<"$osv_json")"
            if [[ -n "$fixed_bookworm" || -n "$fixed_trixie" ]]; then
              allowlist=""
              decision="fixed version detected for Debian:12/13 (bookworm/trixie)."
            else
              decision="bookworm/trixie still vulnerable or no fixed version published."
            fi
          elif tracker_html="$(curl -fsSL "$tracker_url" 2>/dev/null)"; then
            source="Debian tracker"
            if grep -qiE 'bookworm[^<\n]*fixed|trixie[^<\n]*fixed' <<<"$tracker_html"; then
              allowlist=""
              decision="tracker indicates fixed state for bookworm/trixie."
            else
              decision="tracker does not show fixed state for bookworm/trixie."
            fi
          fi

          echo "TRIVY_ALLOWLIST_CVES=$allowlist" >> "$GITHUB_ENV"
          {
            echo "### Trivy Allowlist (dynamic)"
            echo "- Dynamic allowlist: ${allowlist:-none}"
            echo "- Source: Debian tracker/OSV (${source})"
            echo "- Decision: ${decision}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Trivy (JSON)
        uses: aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143 # v0.68.1 default trivy
        with:
          scan-type: "fs"
          scan-ref: "."
          trivyignores: ".trivyignore"
          # Non-productive paths excluded to reduce SARIF noise (#1650).
          # Single-line, no spaces — avoids YAML folded-scalar whitespace ambiguity.
          # Only stable permanent directories; brittle run-id/date names removed.
          skip-dirs: ".worktrees_backup,.codex,artifacts,reports,logs,tmp,tmp_artifacts,evidence-run,emoji-report,mcp_navpack_working_repo,copilot_briefing,third_party,knowledge,docs,examples"
          format: "json"
          output: "trivy-results.json"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "0"

      - name: Summarize Trivy Results
        run: |
          set -euo pipefail
          report="trivy-results.json"
          echo "### Trivy (filesystem)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scan type: fs (scan-ref=.)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: docker-independent scan (kein Image-Inspect)" >> "$GITHUB_STEP_SUMMARY"
          if [ ! -s "$report" ]; then
            echo "- No report generated." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          jq -r '.Results[].Vulnerabilities[]? | select(.Severity == "HIGH" or .Severity == "CRITICAL") | .VulnerabilityID' "$report" | sort -u > /tmp/trivy-high.txt
          total=$(wc -l < /tmp/trivy-high.txt | tr -d " ")
          echo "- HIGH/CRITICAL: $total" >> "$GITHUB_STEP_SUMMARY"
          if [ "$total" -eq 0 ]; then
            exit 0
          fi
          allowlist="${TRIVY_ALLOWLIST_CVES:-}"
          if [ -n "$allowlist" ]; then
            echo "$allowlist" | tr ',' '\n' | sed '/^$/d' | tr -d ' ' > /tmp/trivy-allow.txt
            tr -d ' ' < /tmp/trivy-high.txt > /tmp/trivy-high-clean.txt
            grep -v -F -x -f /tmp/trivy-allow.txt /tmp/trivy-high-clean.txt > /tmp/trivy-disallowed.txt || true
          else
            cp /tmp/trivy-high.txt /tmp/trivy-disallowed.txt
          fi
          disallowed=$(wc -l < /tmp/trivy-disallowed.txt | tr -d " ")
          echo "- Allowlist: ${allowlist:-none}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Disallowed: $disallowed" >> "$GITHUB_STEP_SUMMARY"
          echo "Top findings:" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.Results[].Vulnerabilities[]? | select(.Severity == "HIGH" or .Severity == "CRITICAL") | "\(.Severity) \(.VulnerabilityID) \(.PkgName // "unknown") \(.InstalledVersion // "")"' "$report" | head -n "${TRIVY_SUMMARY_MAX}" >> "$GITHUB_STEP_SUMMARY"
          if [ "$disallowed" -ne 0 ]; then
            echo "Disallowed CVEs:" >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/trivy-disallowed.txt >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Disallowed CVEs found (non-blocking in filesystem mode):"
            cat /tmp/trivy-disallowed.txt
          fi

      - name: Upload Trivy JSON
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: trivy-container-${{ github.run_number }}
          path: trivy-results.json

      - name: Run Trivy (SARIF)
        uses: aquasecurity/trivy-action@876cf04c63f65e9799bcf1043b584e72469c7143 # v0.68.1 default trivy
        with:
          scan-type: "fs"
          scan-ref: "."
          trivyignores: ".trivyignore"
          # Non-productive paths excluded to reduce SARIF noise (#1650).
          # Single-line, no spaces — avoids YAML folded-scalar whitespace ambiguity.
          # Only stable permanent directories; brittle run-id/date names removed.
          skip-dirs: ".worktrees_backup,.codex,artifacts,reports,logs,tmp,tmp_artifacts,evidence-run,emoji-report,mcp_navpack_working_repo,copilot_briefing,third_party,knowledge,docs,examples"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload SARIF to GitHub Security
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v3
        with:
          sarif_file: trivy-results.sarif

