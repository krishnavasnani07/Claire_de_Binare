name: Auto Milestone Label Dispatch

on:
  issues:
    types: [labeled]

permissions:
  contents: write

jobs:
  dispatch-milestone-label:
    if: startsWith(github.event.label.name || '', 'milestone:')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch milestone label event
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const issueNumber = context.payload.issue?.number;
            const labelName = String(context.payload.label?.name || "").trim();

            if (!issueNumber) {
              core.warning("Could not determine the issue number for this event.");
              return;
            }

            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: "auto_milestone_issue_label",
              client_payload: {
                issue_number: issueNumber,
                action: context.payload.action || "",
                label: labelName,
              },
            });

            core.info(
              `Dispatched auto_milestone_issue_label for issue #${issueNumber} (${labelName || "<none>"}).`
            );
