name: Branch Policy Enforcement

on:
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * *'

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          branch_name="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          echo "Branch name: $branch_name"
          
          # Allow main and develop branches
          if [[ "$branch_name" == "main" || "$branch_name" == "develop" ]]; then
            echo "✅ Main/develop branch allowed"
            exit 0
          fi
          
          # Allow dependabot branches
          if [[ "$branch_name" =~ ^dependabot/ ]]; then
            echo "✅ Valid dependabot branch name: $branch_name"
            exit 0
          fi
          
          # Validate branch naming convention
          if [[ "$branch_name" =~ ^(feature|fix|bugfix|hotfix|chore|docs|build|ci|trust|sentinel|jules)/[a-z0-9.-]+$ ]]; then
            echo "✅ Valid branch name (slash): $branch_name"
          elif [[ "$branch_name" =~ ^(feature|fix|bugfix|hotfix|chore|docs|build|ci|trust|sentinel|jules|revert)-[a-z0-9.-]+$ ]]; then
            echo "✅ Valid branch name (hyphen): $branch_name"
          elif [[ "$branch_name" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "✅ Valid release branch name: $branch_name"
          else
            echo "❌ Invalid branch name: $branch_name"
            echo "Branch names must follow these patterns:"
            echo "  - (feature|fix|chore|docs|build|ci|trust|sentinel|jules)/(description)"
            echo "  - (feature|fix|chore|docs|build|ci|trust|sentinel|jules|revert)-(description)"
            echo "  - release/vX.Y.Z"
            echo "  - dependabot/*"
            exit 1
          fi

  validate-feature-workflow:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'feature/')
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        
      - name: Check feature workflow compliance
        run: |
          echo "🔍 Validating feature workflow compliance..."
          
          # Check if PR follows feature workflow template
          if ! grep -q "## Agent Approvals" .github/pull_request_template.md; then
            echo "❌ PR template missing agent approvals section"
            exit 1
          fi
          
          # Check for feature flag configuration (if feature flags directory exists)
          if [ -d "config" ]; then
            echo "✅ Configuration directory present"
          fi
          
          # Check for test files
          if [ -d "tests" ]; then
            echo "✅ Tests directory present"
          else
            echo "⚠️  No tests directory found"
          fi
          
          echo "✅ Basic feature workflow validation passed"

  enforce-pr-template:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - name: Check PR template usage
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            
            const body = pr.body || '';

            // Full feature template sections
            const featureTemplateSections = [
              '## Feature Overview',
              '## Technical Overview',
              '## Test Evidence',
              '## Code Quality',
              '## Deployment & Rollback',
              '## Documentation',
              '## Agent Approvals'
            ];

            // Minimal template for chore/fix/docs PRs
            const hasMinimalTemplate = body.includes('## Summary') &&
                                       (body.match(/^##\s+/gm) || []).length >= 2;

            // Check for full template
            const missingSections = featureTemplateSections.filter(section =>
              !body.includes(section)
            );

            const hasFullTemplate = missingSections.length === 0;

            if (!hasFullTemplate && !hasMinimalTemplate) {
              core.setFailed(`PR must use either: (1) Full feature template with sections: ${featureTemplateSections.join(', ')}, OR (2) Minimal template with "## Summary" + at least one other section`);
            } else {
              if (hasFullTemplate) {
                console.log('✅ Full PR template present');
              } else {
                console.log('✅ Minimal PR template present (Summary + sections)');
              }
            }
