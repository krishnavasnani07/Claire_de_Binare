name: CDB Backlog Curation

on:
  issues:
    types: [labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || 'global' }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  curate:
    if: >-
      ${{
        contains(
          fromJson('["task","type:bug","type:feature","type:refactor","scope:core","scope:infra","scope:ci","scope:data","scope:monitoring"]'),
          github.event.label.name
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build backlog-curation artifact
        id: curate
        shell: bash
        run: |
          set -euo pipefail

          artifact_dir="artifacts/backlog-curation"
          artifact_path="${artifact_dir}/issue-${{ github.event.issue.number }}.json"

          python3 .github/scripts/backlog_curation.py \
            --event-path "${GITHUB_EVENT_PATH}" \
            --repo-root "${GITHUB_WORKSPACE}" \
            --artifact-dir "${artifact_dir}"

          if [[ -f "${artifact_path}" ]]; then
            echo "artifact_exists=true" >> "${GITHUB_OUTPUT}"
            echo "artifact_path=${artifact_path}" >> "${GITHUB_OUTPUT}"
            echo "Backlog-curation artifact ready: ${artifact_path}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "artifact_exists=false" >> "${GITHUB_OUTPUT}"
            echo "No backlog-curation artifact produced for the current issue state." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload backlog-curation artifact
        if: ${{ steps.curate.outputs.artifact_exists == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backlog-curation-issue-${{ github.event.issue.number }}
          path: ${{ steps.curate.outputs.artifact_path }}
          if-no-files-found: error

      - name: Post issue-scoped curation receipt
        if: ${{ steps.curate.outputs.artifact_exists == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          artifact_path="${{ steps.curate.outputs.artifact_path }}"
          issue_number="${{ github.event.issue.number }}"
          body_file="$(mktemp)"

          receipt_json="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(json.dumps(data["receipt"]))' "$artifact_path")"
          marker="$(printf '%s' "$receipt_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["marker"])')"
          fingerprint="$(printf '%s' "$receipt_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["fingerprint"])')"
          status="$(printf '%s' "$receipt_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])')"
          printf '%s' "$receipt_json" | python3 -c 'import json,sys; from pathlib import Path; Path(sys.argv[1]).write_text(json.load(sys.stdin)["body"], encoding="utf-8")' "$body_file"

          comments="$(gh issue view "$issue_number" --repo "${GITHUB_REPOSITORY}" --json comments --jq ".comments[].body")"
          if printf '%s' "$comments" | grep -Fq "$marker"; then
            echo "Reused existing curation receipt for fingerprint ${fingerprint}." >> "${GITHUB_STEP_SUMMARY}"
          else
            gh issue comment "$issue_number" \
              --repo "${GITHUB_REPOSITORY}" \
              --body-file "$body_file"
            echo "Posted issue-scoped curation receipt (${status}) for fingerprint ${fingerprint}." >> "${GITHUB_STEP_SUMMARY}"
          fi

          rm -f "$body_file"
