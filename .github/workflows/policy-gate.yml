name: Policy Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - edited

permissions:
  contents: read
  pull-requests: read

jobs:
  policy-gate:
    name: policy-gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Evaluate PR scope and workflow safety
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labels = (pr.labels || []).map((label) => label.name);
            const labelSet = new Set(labels.map((label) => label.toLowerCase()));
            const title = (pr.title || '').trim();
            const titleLower = title.toLowerCase();

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const changedFiles = files.map((file) => file.filename);
            const isDocsFile = (path) => path.startsWith('docs/') || path.toLowerCase().endsWith('.md');
            const isWorkflowFile = (path) => path.startsWith('.github/workflows/');
            const isInfraFile = (path) => path.startsWith('infrastructure/');
            const hasLabel = (name) => labelSet.has(name);
            const hasPrefix = (name) =>
              titleLower.startsWith(`[${name}]`) || titleLower.startsWith(`${name}:`);

            let category = 'core/service';
            let categorySource = 'default';

            if (hasLabel('docs-only') || hasPrefix('docs-only')) {
              category = 'docs-only';
              categorySource = hasLabel('docs-only') ? 'label:docs-only' : 'title-prefix';
            } else if (hasLabel('workflows-only') || hasPrefix('workflows-only')) {
              category = 'workflows-only';
              categorySource = hasLabel('workflows-only') ? 'label:workflows-only' : 'title-prefix';
            } else if (hasLabel('infra-only') || hasPrefix('infra-only')) {
              category = 'infra-only';
              categorySource = hasLabel('infra-only') ? 'label:infra-only' : 'title-prefix';
            } else if (changedFiles.length > 0 && changedFiles.every(isDocsFile)) {
              category = 'docs-only';
              categorySource = 'file-inference';
            } else if (changedFiles.length > 0 && changedFiles.every(isWorkflowFile)) {
              category = 'workflows-only';
              categorySource = 'file-inference';
            }

            const failures = [];
            const passes = [];

            if (category === 'docs-only') {
              const invalidDocsFiles = changedFiles.filter((path) => !isDocsFile(path));
              if (invalidDocsFiles.length > 0) {
                failures.push(
                  `docs-only allows only docs/** and *.md, but found: ${invalidDocsFiles.join(', ')}`
                );
              } else {
                passes.push('docs-only scope validated');
              }
            } else if (category === 'workflows-only') {
              const invalidWorkflowFiles = changedFiles.filter((path) => !isWorkflowFile(path));
              if (invalidWorkflowFiles.length > 0) {
                failures.push(
                  `workflows-only allows only .github/workflows/**, but found: ${invalidWorkflowFiles.join(', ')}`
                );
              } else {
                passes.push('workflows-only scope validated');
              }
            } else if (category === 'infra-only') {
              const invalidInfraFiles = changedFiles.filter(
                (path) => !isInfraFile(path) && !isWorkflowFile(path)
              );
              if (invalidInfraFiles.length > 0) {
                failures.push(
                  `infra-only allows only infrastructure/** and .github/workflows/**, but found: ${invalidInfraFiles.join(', ')}`
                );
              } else {
                passes.push('infra-only scope validated');
              }
            } else if (!hasLabel('manual-approval') && !hasLabel('allow-core-change')) {
              failures.push(
                'core/service changes require the label manual-approval or allow-core-change'
              );
            } else {
              passes.push('core/service override label present');
            }

            const workflowFiles = files.filter(
              (file) => isWorkflowFile(file.filename) && file.status !== 'removed'
            );

            for (const file of workflowFiles) {
              let content;

              try {
                const response = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: file.filename,
                  ref: pr.head.sha,
                });

                if (!('content' in response.data)) {
                  failures.push(`Unable to inspect workflow file: ${file.filename}`);
                  continue;
                }

                content = Buffer.from(response.data.content, 'base64').toString('utf8');
              } catch (error) {
                failures.push(`Unable to inspect workflow file ${file.filename}: ${error.message}`);
                continue;
              }

              if (/^\s*pull_request_target\s*:/m.test(content)) {
                failures.push(`Workflow ${file.filename} contains pull_request_target`);
              }

              if (!/^\s*permissions\s*:/m.test(content)) {
                failures.push(`Workflow ${file.filename} is missing an explicit permissions section`);
              }

              if (/^\s*permissions\s*:\s*write-all\s*$/m.test(content)) {
                failures.push(`Workflow ${file.filename} contains write-all`);
              }
            }

            const result = failures.length === 0 ? 'PASS' : 'FAIL';

            await core.summary
              .addHeading('Policy Gate')
              .addTable([
                [
                  { data: 'Field', header: true },
                  { data: 'Value', header: true },
                ],
                ['PR', `#${pr.number}`],
                ['Category', category],
                ['Category source', categorySource],
                ['Labels', labels.length ? labels.join(', ') : '(none)'],
                ['Result', result],
              ])
              .addHeading('Changed Files', 2)
              .addCodeBlock(changedFiles.join('\n') || '(none)', 'text')
              .addHeading('PASS Rules', 2)
              .addList(passes.length ? passes : ['None'])
              .addHeading('FAIL Rules', 2)
              .addList(failures.length ? failures : ['None'])
              .write();

            core.info(`policy-gate category=${category} source=${categorySource} result=${result}`);
            core.info(`policy-gate changed files: ${changedFiles.join(', ') || '(none)'}`);

            if (failures.length > 0) {
              core.setFailed(failures.join(' | '));
            }
