name: Docs Hub Guard

# NOISE-FREEZE (#2613): auto-triggers disabled due to billing/account-locked
# non-required check noise. Manual workflow_dispatch remains available.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Block runtime artifacts
        shell: bash
        run: |
          set -euo pipefail
          echo "Scanning for runtime artifacts..."
          bad="$(
            {
              git ls-files | grep -E '(^|/)(__pycache__/|\.pytest_cache/|.*\.pyc$|.*\.pyo$|(^|/)logs/)' || true
              git ls-files | grep -E '.*\.log$' | grep -vE '^docs/runbooks/evidence/.*\.log$' || true
            } | sort -u
          )"
          if [ -n "$bad" ]; then
            echo "Found forbidden runtime artifacts tracked in git:"
            echo "$bad"
            exit 1
          fi

      - name: Basic secret pattern scan (best-effort)
        shell: bash
        run: |
          set -euo pipefail
          echo "Best-effort secret scan (patterns)."
          include_paths=(
            agents
            knowledge
            governance
            docs
          )
          git fetch origin main >/dev/null 2>&1 || true
          mapfile -t changed_files < <(git diff --name-only origin/main)
          scan_files=()
          for root in "${include_paths[@]}"; do
            for file in "${changed_files[@]}"; do
              if [[ "$file" == "$root"* ]]; then
                scan_files+=("$file")
              fi
            done
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "Keine Änderungen in den überwachten Ordnern; Secret-Scan übersprungen."
            exit 0
          fi
          hits="$(git grep -nEI '(api[_-]?key|secret|token|private[_-]?key|BEGIN (RSA|OPENSSH) PRIVATE KEY|xox[baprs]-|ghp_[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16})' -- "${scan_files[@]}" || true)"
          if [ -n "$hits" ]; then
            echo "Potential secret-like strings found in geänderten Dateien (review required):"
            echo "$hits"
            echo ""
            echo "If these are false positives, adjust the workflow patterns or move values to local .env/.secrets."
            exit 1
          fi

      - name: Enforce consolidated top-level folders
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking consolidated top-level folders..."
          for d in agents governance knowledge docs; do
            if [ ! -d "$d" ]; then
              echo "Missing required top-level folder: $d"
              exit 1
            fi
          done

      - name: Block legacy split defaults in key entrypoints
        shell: bash
        run: |
          set -euo pipefail
          files=(
            README.md
            AGENTS.md
            mcp_navpack_working_repo/ENTRYPOINTS.yaml
            mcp_navpack_working_repo/CHEATSHEET.md
            mcp_navpack_working_repo/DOCS_HUB.pointer.md
          )
          hits="$(grep -nE '\.\./Claire_de_Binare_Docs|D:\\Dev\\Workspaces\\Repos\\Claire_de_Binare_Docs|canonical agent registry lives in the separate Docs Hub repo|Working Repo relies on the Docs Hub canonical registry' "${files[@]}" || true)"
          if [ -n "$hits" ]; then
            echo "Found stale split-repo defaults in key entrypoints:"
            echo "$hits"
            exit 1
          fi
