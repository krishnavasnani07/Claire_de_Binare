name: Weekly Digest Failure Alert
on:
  workflow_run:
    workflows: ["Weekly Project Digest"]
    types: [completed]
  workflow_dispatch:
    inputs:
      conclusion:
        description: "Manual conclusion override (success => no-op)"
        required: false
        default: "success"
      run_url:
        description: "Optional run URL override for manual tests"
        required: false
        default: ""

concurrency:
  group: weekly-digest-fail-alert
  cancel-in-progress: true

jobs:
  weekly-digest-failure-alert:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      MANUAL_CONCLUSION: ${{ github.event.inputs.conclusion }}
      MANUAL_RUN_URL: ${{ github.event.inputs.run_url }}
    steps:
      - name: Resolve CDB auth token (APP preferred, PAT fallback)
        id: resolve-auth
        shell: bash
        env:
          LEGACY_PAT: ${{ secrets.ADD_TO_PROJECT_PAT }}
          CDB_GH_APP_ID: ${{ secrets.CDB_GH_APP_ID }}
          CDB_GH_APP_INSTALLATION_ID: ${{ secrets.CDB_GH_APP_INSTALLATION_ID }}
          CDB_GH_APP_PRIVATE_KEY: ${{ secrets.CDB_GH_APP_PRIVATE_KEY }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -euo pipefail

          b64url() {
            openssl base64 -A | tr '+/' '-_' | tr -d '='
          }

          has_app_id="false"
          has_app_key="false"
          [[ -n "${CDB_GH_APP_ID:-}" ]] && has_app_id="true"
          [[ -n "${CDB_GH_APP_PRIVATE_KEY:-}" ]] && has_app_key="true"

          if [[ "$has_app_id" != "$has_app_key" ]]; then
            echo "Incomplete GitHub App auth config. Set both CDB_GH_APP_ID and CDB_GH_APP_PRIVATE_KEY, or unset both to use ADD_TO_PROJECT_PAT." >&2
            exit 1
          fi

          if [[ "$has_app_id" == "true" ]]; then
            now="$(date +%s)"
            iat="$((now - 60))"
            exp="$((now + 540))"

            header='{"alg":"RS256","typ":"JWT"}'
            payload="$(jq -nc --arg iss "$CDB_GH_APP_ID" --argjson iat "$iat" --argjson exp "$exp" '{iss:$iss,iat:$iat,exp:$exp}')"
            signing_input="$(printf '%s' "$header" | b64url).$(printf '%s' "$payload" | b64url)"

            key_file="$(mktemp)"
            trap 'rm -f "$key_file"' EXIT
            printf '%s' "$CDB_GH_APP_PRIVATE_KEY" > "$key_file"

            signature="$(printf '%s' "$signing_input" | openssl dgst -sha256 -sign "$key_file" -binary | b64url)"
            app_jwt="${signing_input}.${signature}"

            installation_id="${CDB_GH_APP_INSTALLATION_ID:-}"
            if [[ -z "$installation_id" ]]; then
              install_json="$(curl -fsSL \
                -H "Authorization: Bearer ${app_jwt}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${REPO_FULL}/installation")"
              installation_id="$(jq -r '.id // empty' <<<"$install_json")"
            fi

            if [[ -z "$installation_id" ]]; then
              echo "GitHub App mode selected but installation id could not be resolved. Set CDB_GH_APP_INSTALLATION_ID." >&2
              exit 1
            fi

            token_json="$(curl -fsSL -X POST \
              -H "Authorization: Bearer ${app_jwt}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/app/installations/${installation_id}/access_tokens")"
            app_token="$(jq -r '.token // empty' <<<"$token_json")"

            if [[ -z "$app_token" ]]; then
              echo "GitHub App mode selected but access token minting failed." >&2
              exit 1
            fi

            echo "::add-mask::${app_token}"
            echo "cdb_auth_token=${app_token}" >> "$GITHUB_OUTPUT"
            echo "auth_mode=APP" >> "$GITHUB_OUTPUT"
            echo "Auth mode selected: APP"
          elif [[ -n "${LEGACY_PAT:-}" ]]; then
            echo "::add-mask::${LEGACY_PAT}"
            echo "cdb_auth_token=${LEGACY_PAT}" >> "$GITHUB_OUTPUT"
            echo "auth_mode=PAT" >> "$GITHUB_OUTPUT"
            echo "Auth mode selected: PAT"
          else
            echo "No auth token configured. Set CDB_GH_APP_ID + CDB_GH_APP_PRIVATE_KEY (+ optional CDB_GH_APP_INSTALLATION_ID) or ADD_TO_PROJECT_PAT." >&2
            exit 1
          fi

      - name: Create or update weekly digest failure issue
        shell: bash
        env:
          CDB_AUTH_TOKEN: ${{ steps.resolve-auth.outputs.cdb_auth_token }}
          GH_TOKEN: ${{ steps.resolve-auth.outputs.cdb_auth_token }}
        run: |
          set -euo pipefail

          repo="${GITHUB_REPOSITORY}"
          event_name="${GITHUB_EVENT_NAME}"
          event_path="${GITHUB_EVENT_PATH}"
          now_utc="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if [[ "$event_name" == "workflow_run" ]]; then
            workflow_name="$(jq -r '.workflow_run.name // "Weekly Project Digest"' "$event_path")"
            conclusion="$(jq -r '.workflow_run.conclusion // empty' "$event_path")"
            run_url="$(jq -r '.workflow_run.html_url // empty' "$event_path")"
            event_timestamp="$(jq -r '.workflow_run.updated_at // .workflow_run.created_at // empty' "$event_path")"
          else
            workflow_name="Weekly Project Digest (manual)"
            conclusion="${MANUAL_CONCLUSION:-success}"
            run_url="${MANUAL_RUN_URL:-}"
            event_timestamp="$now_utc"
          fi

          if [[ -z "$conclusion" || "$conclusion" == "success" ]]; then
            echo "No alert needed (conclusion='${conclusion:-<empty>}')."
            exit 0
          fi

          if ! week_key="$(date -u -d "$event_timestamp" +%G-W%V 2>/dev/null)"; then
            week_key="$(date -u +%G-W%V)"
          fi

          if [[ -z "$run_url" ]]; then
            run_url="https://github.com/${repo}/actions/workflows/weekly_digest.yml"
          fi

          marker="<!-- weekly-digest-fail:${week_key} -->"
          issue_title="Weekly Digest Failure — ${week_key}"

          body="$(
            {
              echo "# Weekly Digest Failure"
              echo
              echo "${marker}"
              echo
              echo "- Workflow: ${workflow_name}"
              echo "- Conclusion: \`${conclusion}\`"
              echo "- Run: ${run_url}"
              echo "- Timestamp (UTC): ${event_timestamp:-$now_utc}"
              echo
              echo "Hinweis: Prüfe zuerst Auth/Permissions/Secret/Budget (GitHub App oder \`ADD_TO_PROJECT_PAT\`, Project-v2-Zugriff, Actions Billing)."
            }
          )"

          existing_issue_json="$(
            gh api --paginate --slurp "repos/${repo}/issues?state=all&per_page=100" \
              | jq -c --arg marker "$marker" '
                  map(.[])
                  | map(select((has("pull_request") | not) and ((.body // "") | contains($marker))))
                  | sort_by(.created_at // "")
                  | reverse
                  | .[0] // empty
                '
          )"

          if [[ -n "${existing_issue_json:-}" ]]; then
            issue_number="$(jq -r '.number // empty' <<<"$existing_issue_json")"
            update_payload="$(jq -nc --arg title "$issue_title" --arg body "$body" '{title:$title,body:$body,state:"open"}')"
            update_resp="$(printf '%s' "$update_payload" | gh api --method PATCH "repos/${repo}/issues/${issue_number}" --input -)"
            issue_url="$(jq -r '.html_url // empty' <<<"$update_resp")"
            action_result="updated"
          else
            create_payload="$(jq -nc --arg title "$issue_title" --arg body "$body" '{title:$title,body:$body,labels:["report:weekly-fail"]}')"
            create_resp="$(printf '%s' "$create_payload" | gh api --method POST "repos/${repo}/issues" --input -)"
            issue_number="$(jq -r '.number // empty' <<<"$create_resp")"
            issue_url="$(jq -r '.html_url // empty' <<<"$create_resp")"
            action_result="created"
          fi

          if [[ -z "$issue_number" || -z "$issue_url" ]]; then
            echo "Alert issue ${action_result} failed (missing issue number/url)." >&2
            exit 1
          fi

          gh api --method POST "repos/${repo}/issues/${issue_number}/labels" -f labels[]=report:weekly-fail > /dev/null
          echo "Weekly digest failure alert ${action_result}: #${issue_number} ${issue_url}"
