# ‚ö†ÔłŹ PARKED fail-closed in #2772 (2026-06-02).
# Auto-routed CDB Control Board Project items from `issues`, `pull_request`,
# and `repository_dispatch` events. The live triggers are removed because the
# auto-routing surface has been intentionally withdrawn in the current control
# posture:
# - `issues` and `pull_request` automatic routing fired on every issue/PR event
#   in the repo, with `vars.CDB_CONTROL_BOARD_AUTOMATION_ENABLED` as the only
#   effective gate.
# - `repository_dispatch` (event type `control_board_route_issue_label`) was
#   fed by `control-board-routing-label-dispatch.yml` on every routing-relevant
#   label change and produced additional project mutations.
# - The board is still kept consistent by the active `control_board_upsert.yml`
#   (`workflow_dispatch` + Monday `02:30 UTC` schedule), gated by
#   `CDB_CONTROL_BOARD_AUTOMATION_ENABLED`.
# No automatic issue/PR routing remains. The workflow is retained as a
# `workflow_dispatch` stub only; it does NOT call the routing script because
# `route_control_board.py` requires a GitHub event payload (`issues`,
# `pull_request`, or `repository_dispatch`) which `workflow_dispatch` does not
# provide. Re-enable per-event routing requires a separate scoped issue.
# See .github/README.md for current control-plane documentation.

name: Control Board Auto Routing

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parked-notice:
    runs-on: ubuntu-latest
    steps:
      - name: Parking notice
        run: |
          echo "‚ö†ÔłŹ  Control Board Auto Routing is parked fail-closed."
          echo "Auto-triggers removed in #2772 (2026-06-02):"
          echo "  - on: issues"
          echo "  - on: pull_request"
          echo "  - on: repository_dispatch (type: control_board_route_issue_label)"
          echo "Active board reconciliation runs through control_board_upsert.yml"
          echo "(workflow_dispatch + Mon 02:30 UTC schedule, gated by"
          echo "vars.CDB_CONTROL_BOARD_AUTOMATION_ENABLED)."
          echo "This dispatch stub prints the diagnostic only; no Project API"
          echo "mutations are performed."
          echo "See .github/README.md for current control-plane documentation."
