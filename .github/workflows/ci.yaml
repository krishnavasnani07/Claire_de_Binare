# Secondary legacy multi-job pipeline.
# This file is not the canonical PR gate and not the 431B Docker CI lab baseline.
name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:  # Manueller Trigger

env:
  PYTHON_VERSION: '3.12'
  CACHE_VERSION: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ============================================
  # CODE QUALITY CHECKS
  # ============================================

  core-guard:
    name: Core Duplicates Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run core duplicates check
        run: python scripts/check_core_duplicates.py

  lint:
    name: Linting (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Ruff
        run: pip install ruff

      - name: Fetch main for diff
        run: git fetch origin +refs/heads/main:refs/remotes/origin/main

      - name: Determine changed Python files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.base_ref }}"
            base="origin/$base_ref"
          else
            base="${{ github.event.before }}"
          fi

          if [ -n "$base_ref" ]; then
            git fetch origin "$base_ref"
          fi

          git fetch origin --unshallow || true

          files=$(git diff --name-only "$base"...HEAD -- '*.py')

          relevant=$(echo "$files" | tr '\n' ' ')
          relevant=$(echo "$relevant" | tr ' ' '\n' | grep -E '^(services|tests)/' || true)
          relevant=$(echo "$relevant" | tr '\n' ' ' | sed 's/ $//')
          if [ -z "$relevant" ]; then
            echo "no_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "files=$relevant" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Ruff
        if: steps.changed.outputs.no_files != 'true'
        run: ruff check ${{ steps.changed.outputs.files }} --output-format=github

      - name: Skip lint check
        if: steps.changed.outputs.no_files == 'true'
        run: echo "Keine relevante Python-Datei geändert; Linting übersprungen."

  format-check:
    name: Format Check (Black)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Black
        run: pip install black==23.12.1

      - name: Fetch main for diff
        run: git fetch origin +refs/heads/main:refs/remotes/origin/main

      - name: Determine changed Python files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.base_ref }}"
            base="origin/$base_ref"
          else
            base="${{ github.event.before }}"
          fi

          if [ -n "$base_ref" ]; then
            git fetch origin "$base_ref"
          fi

          git fetch origin --unshallow || true

          files=$(git diff --name-only "$base"...HEAD -- '*.py')

          relevant=$(echo "$files" | tr '\n' ' ')
          relevant=$(echo "$relevant" | tr ' ' '\n' | grep -E '^(services|tests)/' || true)
          relevant=$(echo "$relevant" | tr '\n' ' ' | sed 's/ $//')
          if [ -z "$relevant" ]; then
            echo "no_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "files=$relevant" >> "$GITHUB_OUTPUT"
          fi

      - name: Check formatting
        if: steps.changed.outputs.no_files != 'true'
        run: black --check --diff ${{ steps.changed.outputs.files }}

      - name: Skip formatting check
        if: steps.changed.outputs.no_files == 'true'
        run: echo "Keine Python-Datei geändert; Formatprüfung übersprungen."
  type-check:
    name: Type Checking (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          # Install base dev requirements if they exist
          if [ -f "requirements-dev.txt" ]; then
            pip install -r requirements-dev.txt
          else
            pip install mypy
          fi

      - name: Run mypy
        run: mypy services/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # Nicht blockierend in MVP-Phase

  # ============================================
  # TESTS
  # ============================================

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          # Install base dev requirements if they exist
          if [ -f "requirements-dev.txt" ]; then
            pip install -r requirements-dev.txt
          else
            pip install pytest pytest-cov psycopg2-binary redis
          fi
          pip install -r requirements-mcp.txt

      - name: MCP Validation
        run: make mcp-config-validate MCP_CONFIG_PATHS="tests/fixtures/mcp_smoke_config.json"

      - name: Run tests with coverage
        run: |
          pytest -v -m "not e2e and not local_only" \
            --cov=core \
            --cov=services \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=0

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

      - name: Coverage comment
        if: matrix.python-version == '3.12'
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          coverage report >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # NOTE: E2E Happy Path has been moved to a dedicated workflow
  # See: .github/workflows/e2e-happy-path.yaml
  # Reason: E2E must run even for docs-only PRs to satisfy branch protection
  # but this workflow has paths-ignore that skips docs/markdown changes

  # ============================================
  # CONTRACT TESTS
  # ============================================

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          if [ -f "requirements-dev.txt" ]; then
            pip install -r requirements-dev.txt
          else
            pip install pytest
          fi
          pip install -r requirements.txt
          pip install -r requirements-mcp.txt

      - name: MCP Validation
        run: make mcp-config-validate MCP_CONFIG_PATHS="tests/fixtures/mcp_smoke_config.json"

      - name: Run contract tests
        run: |
          pytest -m contract -v --tb=short --maxfail=1

  contract-drift-guard:
    name: Contract Drift Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Run Contract Drift Guard
        run: |
          python scripts/lr003_contract_drift_guard.py --check

      - name: Drift detected guidance
        if: failure()
        run: |
          echo "::error::Contract drift detected. Protected files modified."
          echo "If changes are intentional:"
          echo "  1. python scripts/lr003_contract_drift_guard.py --generate"
          echo "  2. Commit updated LR-003-FINGERPRINT.json"
          echo "  3. Re-push to trigger CI"

  lr-004-completion-guard:
    name: "LR-004: Completion State Validation"
    runs-on: ubuntu-latest
    needs: [contract-drift-guard]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run LR-004 Completion Guard
        id: lr004_guard
        run: |
          python scripts/lr004_completion_guard.py --check

      - name: Upload validation failure artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: lr004-validation-failure
          path: |
            docs/live-readiness/LR-TASKS.yaml
            docs/live-readiness/LR-*-STATE.yaml
            docs/live-readiness/LR-004-EVIDENCE.md
          retention-days: 7

      - name: Validation failed guidance
        if: failure()
        run: |
          echo "::error::LR-004 Completion Guard: Validation failed (fail-closed)"
          echo "One or more LR-Task state files are invalid or missing."
          echo ""
          echo "Resolution Steps:"
          echo "  1. Review validation errors above"
          echo "  2. Fix invalid LR-*-STATE.yaml files"
          echo "  3. Ensure all tasks in manifest have matching STATE files"
          echo "  4. Run locally: python scripts/lr004_completion_guard.py --check"
          echo "  5. Commit fixes and re-push"
          echo ""
          echo "See: docs/live-readiness/LR-004-SPEC.md"

  correlation-event-coverage-guard:
    name: Correlation Event Coverage Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Run Correlation Event Coverage Guard
        run: |
          python scripts/governance/check_correlation_event_coverage.py

  # ============================================
  # SECURITY CHECKS
  # ============================================

  secrets-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Volle Historie für Gitleaks

      - name: Run Gitleaks
        run: |
          # Download and install gitleaks
          GITLEAKS_VERSION="v8.21.0"
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_8.21.0_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz
          chmod +x gitleaks
          ./gitleaks detect --config gitleaks.toml --no-git --source . --verbose --gitleaks-ignore-path .gitleaksignore

  trivy-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@22438a435773de8c97dc0958cc0b823c45b064ac
        with:
          scan-type: fs
          scan-ref: .
          trivyignores: .trivyignore
          skip-dirs: .worktrees_backup
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true

      - name: Trivy reporting mode summary
        run: |
          echo "### Trivy Scan" >> $GITHUB_STEP_SUMMARY
          echo "- Non-blocking mode (reporting-only)." >> $GITHUB_STEP_SUMMARY
          echo "- Full findings are available in this job log." >> $GITHUB_STEP_SUMMARY

  security-audit:
    name: Security Audit (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: bandit -r services/ -f json -o bandit-report.json
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit --requirement requirements.txt --format json --output pip-audit.json
        continue-on-error: true

      - name: Upload pip-audit report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pip-audit-report
          path: pip-audit.json
          retention-days: 30

  # ============================================
  # DOCUMENTATION CHECKS
  # ============================================

  docs-check:
    name: Documentation Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '20'

      - name: Install markdownlint
        run: npm install -g markdownlint-cli

      - name: Check Markdown files
        run: |
          markdownlint '**/*.md' --ignore node_modules --ignore .venv || true

      - name: Check for broken links
        run: |
          echo "Link checking would go here (e.g., with markdown-link-check)"
          echo "Skipped in MVP phase"

  # ============================================
  # BUILD SUMMARY
  # ============================================

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [core-guard, lint, format-check, type-check, test, contract-tests, contract-drift-guard, lr-004-completion-guard, secrets-scan, trivy-scan, security-audit, dependency-audit, docs-check]
    if: always()
    steps:
      - name: Create summary
        run: |
          echo "## 🎯 CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Jobs:" >> $GITHUB_STEP_SUMMARY
          echo "- Core Guard: ${{ needs.core-guard.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Linting: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Format Check: ${{ needs.format-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Type Check: ${{ needs.type-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Contract Tests: ${{ needs.contract-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Contract Drift Guard: ${{ needs.contract-drift-guard.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- LR-004 Completion Guard: ${{ needs.lr-004-completion-guard.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Secret Scan: ${{ needs.secrets-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy Scan: ${{ needs.trivy-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Audit: ${{ needs.security-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Audit: ${{ needs.dependency-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docs Check: ${{ needs.docs-check.result }}" >> $GITHUB_STEP_SUMMARY
